<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of Haystack Rock &mdash; Interactive Natural History Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --amber:  #c97a08;
  --sky:    #2e7db8;
  --purple: #6a4ab8;
  --teal:   #1e9898;
  --green:  #1e8838;
  --sand:   #d8b878;
  --ink:    #18120a;
  --cream:  #faf5ec;
  --muted:  #7a6a50;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a2e48;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
}

/* ===== MAIN LAYOUT ===== */
#app {
  position: relative;
  width: 100%; height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ===== SCENE ===== */
#scene-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
}

#scene {
  width: 100%; height: 100%;
  display: block;
  transition:
    transform 0.72s cubic-bezier(0.22, 0.61, 0.36, 1),
    transform-origin 0.72s cubic-bezier(0.22, 0.61, 0.36, 1);
  will-change: transform;
}

#scene.zoomed { transform: scale(1.88); }

/* ===== HEADER ===== */
#hdr {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 16px 22px 0;
  z-index: 20;
  pointer-events: none;
  transition: opacity 0.4s;
}
#hdr.dim { opacity: 0.35; }

.hdr-card {
  background: rgba(250,245,236,0.93);
  backdrop-filter: blur(10px);
  border-radius: 0 0 12px 12px;
  padding: 10px 18px 12px;
}
.hdr-loc {
  font-family: 'Space Mono', monospace;
  font-size: 8.5px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted);
}
.hdr-title {
  font-family: 'Lora', serif;
  font-size: 20px; font-weight: 700;
  color: var(--ink); line-height: 1.1;
  margin-top: 2px;
}
.hdr-sub {
  font-size: 10px; color: var(--muted);
  margin-top: 1px; letter-spacing: 0.04em;
}
.hdr-stat {
  text-align: right;
  border-bottom: 2px solid var(--sky);
}
.hdr-stat-val {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  color: var(--amber); line-height: 1;
}
.hdr-stat-label {
  font-size: 8px; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-top: 2px;
}

/* ===== BACK BUTTON ===== */
#back-btn {
  position: absolute; top: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(250,245,236,0.95);
  border: 1.5px solid var(--amber);
  border-radius: 24px;
  padding: 7px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  color: var(--muted); cursor: pointer;
  z-index: 25; display: none;
  transition: background 0.2s, color 0.2s;
}
#back-btn:hover { background: var(--amber); color: #fff; }
#back-btn.show { display: block; }

/* ===== TOOLTIP ===== */
#tip {
  position: absolute;
  background: rgba(24,18,10,0.9);
  color: var(--cream);
  border-radius: 7px;
  padding: 5px 13px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.08em;
  pointer-events: none; z-index: 30;
  opacity: 0; transition: opacity 0.14s;
  transform: translateX(-50%);
  white-space: nowrap;
  border-bottom: 2px solid transparent;
}
#tip.show { opacity: 1; }

/* ===== HINT ===== */
#hint {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: rgba(250,245,236,0.9);
  backdrop-filter: blur(8px);
  border-radius: 24px; padding: 7px 18px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: 0.08em;
  z-index: 15; pointer-events: none;
  transition: opacity 0.45s;
}
#hint.gone { opacity: 0; }
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--amber);
  animation: dotPulse 2s infinite;
}
@keyframes dotPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.6); }
}

/* ===== LEGEND ===== */
#legend {
  position: absolute; bottom: 20px; left: 18px;
  display: flex; flex-direction: column; gap: 4px;
  z-index: 15; pointer-events: none;
  transition: opacity 0.45s;
}
#legend.gone { opacity: 0; }
.leg-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(250,245,236,0.88);
  backdrop-filter: blur(6px);
  border-radius: 6px; padding: 4px 10px;
}
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.leg-lbl { font-size: 9.5px; font-family: 'Space Mono', monospace; color: var(--muted); }

/* ===== ZONE HOTSPOTS ===== */
.zhit { cursor: pointer; }
.zhit .halo { opacity: 0; transition: opacity 0.22s; }
.zhit:hover .halo { opacity: 1; }
.zhit.on .halo { opacity: 1; }
.zhit.dim { opacity: 0.55; transition: opacity 0.3s; }

/* ===== INFO PANEL ===== */
#panel {
  position: absolute; top: 0; right: 0;
  width: clamp(320px, 32vw, 420px);
  height: 100%;
  background: var(--cream);
  border-left: 1px solid rgba(0,0,0,0.08);
  transform: translateX(105%);
  transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
  z-index: 40;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: -8px 0 40px rgba(0,0,0,0.12);
}
#panel.open { transform: translateX(0); }

#panel-bar { height: 5px; width: 100%; flex-shrink: 0; transition: background 0.3s; }

#panel-scroll {
  flex: 1; overflow-y: auto;
  padding: 24px 22px 48px;
}
#panel-scroll::-webkit-scrollbar { width: 3px; }
#panel-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
#panel-scroll::-webkit-scrollbar-track { background: transparent; }

.p-close {
  position: absolute; top: 12px; right: 12px;
  width: 28px; height: 28px; border-radius: 50%;
  background: transparent; border: 1px solid rgba(0,0,0,0.15);
  cursor: pointer; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.p-close:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.p-tag {
  font-family: 'Space Mono', monospace;
  font-size: 8.5px; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 6px;
  opacity: 0.65;
}
.p-name {
  font-family: 'Lora', serif;
  font-size: 30px; font-weight: 700;
  line-height: 1; margin-bottom: 4px;
}
.p-elev {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-bottom: 18px; letter-spacing: 0.05em;
}
.p-desc {
  font-family: 'Lora', serif;
  font-size: 13.5px; line-height: 1.78;
  color: #3a3028; margin-bottom: 22px;
}
.p-section {
  font-size: 8.5px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.facts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
.fact {
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 8px; padding: 10px 12px;
  display: flex; gap: 10px; align-items: flex-start;
}
.fact-ico { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.fact-name {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  margin-bottom: 3px;
}
.fact-body { font-size: 11.5px; line-height: 1.62; color: #5a4f40; }
.sp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.sp-card {
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 7px; padding: 8px 10px;
}
.sp-name { font-size: 11.5px; font-weight: 600; color: var(--ink); }
.sp-sci { font-size: 10px; font-style: italic; color: var(--muted); margin-top: 1px; }

/* ===== ANIMATIONS ===== */
@keyframes waveDrift {
  0%   { transform: translateX(0px); }
  50%  { transform: translateX(10px); }
  100% { transform: translateX(0px); }
}
.wave { animation: waveDrift 4s ease-in-out infinite; }
.wave:nth-of-type(2) { animation-delay: -1.3s; animation-duration: 3.5s; }
.wave:nth-of-type(3) { animation-delay: -2.6s; animation-duration: 5s; }
.wave:nth-of-type(4) { animation-delay: -0.8s; animation-duration: 4.5s; }

@keyframes grassWave {
  0%,100% { transform: rotate(0deg); }
  40%      { transform: rotate(5deg); }
  80%      { transform: rotate(-3deg); }
}
.gb { transform-origin: 50% 100%; animation: grassWave 2.8s ease-in-out infinite; }
.gb:nth-child(odd)  { animation-delay: -1.4s; animation-duration: 3.2s; }
.gb:nth-child(3n)   { animation-delay: -2.1s; animation-duration: 2.5s; }

@keyframes foamPulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 0.4; }
}
.foam { animation: foamPulse 2.4s ease-in-out infinite; }
.foam:nth-of-type(2) { animation-delay: -1.2s; }

@keyframes birdGlide {
  0%   { transform: translateX(-60px) translateY(0);   opacity: 0; }
  8%   { opacity: 1; }
  45%  { transform: translateX(80px)  translateY(-12px); opacity: 1; }
  92%  { opacity: 1; }
  100% { transform: translateX(220px) translateY(-5px);  opacity: 0; }
}
.bird { animation: birdGlide 11s ease-in-out infinite; }
.bird:nth-of-type(2) { animation-delay: -3.5s; animation-duration: 14s; }
.bird:nth-of-type(3) { animation-delay: -7s;   animation-duration: 9s; }

@keyframes shimmer {
  0%,100% { opacity: 0.18; }
  50%      { opacity: 0.32; }
}
.shimmer { animation: shimmer 3s ease-in-out infinite; }

@keyframes cloudDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(18px); }
}
.cloud { animation: cloudDrift 12s ease-in-out infinite alternate; }
.cloud:nth-of-type(2) { animation-duration: 17s; animation-delay: -6s; }
.cloud:nth-of-type(3) { animation-duration: 22s; animation-delay: -11s; }
</style>
</head>
<body>
<div id="app">
  <div id="scene-wrap">

    <!-- ============================================================
         MAIN SVG ILLUSTRATION — entire scene is rendered here
         ============================================================ -->
    <svg id="scene" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="xMidYMid slice">
      <defs>

        <!-- SKY -->
        <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1e4878"/>
          <stop offset="38%"  stop-color="#3a7ab5"/>
          <stop offset="72%"  stop-color="#78b0d8"/>
          <stop offset="100%" stop-color="#d8a860"/>
        </linearGradient>

        <!-- OCEAN -->
        <linearGradient id="gOcean" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2878a8"/>
          <stop offset="40%"  stop-color="#185880"/>
          <stop offset="100%" stop-color="#0a2840"/>
        </linearGradient>

        <!-- SAND -->
        <linearGradient id="gSand" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#d8c090"/>
          <stop offset="50%"  stop-color="#c0a878"/>
          <stop offset="100%" stop-color="#a88860"/>
        </linearGradient>

        <!-- WET SAND near waterline -->
        <linearGradient id="gWetSand" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#9898b0" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#9898b0" stop-opacity="0"/>
        </linearGradient>

        <!-- ROCK BODY — left lighter, right darker (lighting from left) -->
        <linearGradient id="gRock" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#504840"/>
          <stop offset="30%"  stop-color="#383028"/>
          <stop offset="70%"  stop-color="#282018"/>
          <stop offset="100%" stop-color="#181008"/>
        </linearGradient>

        <!-- ROCK LEFT FACE HIGHLIGHT -->
        <linearGradient id="gRockHighlight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#887868" stop-opacity="0.42"/>
          <stop offset="28%"  stop-color="#887868" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#887868" stop-opacity="0"/>
        </linearGradient>

        <!-- ROCK TOP HIGHLIGHT (sun hitting the top face) -->
        <linearGradient id="gRockTop" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#a09080" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#a09080" stop-opacity="0"/>
        </linearGradient>

        <!-- ZONE FILLS (clipped into rock) -->
        <linearGradient id="zSum" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2a5818"/>
          <stop offset="100%" stop-color="#204510"/>
        </linearGradient>
        <linearGradient id="zCli" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#181a28"/>
          <stop offset="100%" stop-color="#101520"/>
        </linearGradient>
        <linearGradient id="zFac" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#14101e"/>
          <stop offset="100%" stop-color="#100c18"/>
        </linearGradient>
        <linearGradient id="zCav" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#081018"/>
          <stop offset="100%" stop-color="#050c10"/>
        </linearGradient>
        <linearGradient id="zTid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#081410"/>
          <stop offset="100%" stop-color="#050f0a"/>
        </linearGradient>

        <!-- ZONE HALO FILLS (for hover/active highlight) -->
        <linearGradient id="hSum" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#c97a08" stop-opacity="0.52"/>
          <stop offset="100%" stop-color="#c97a08" stop-opacity="0.09"/>
        </linearGradient>
        <linearGradient id="hCli" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2e7db8" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#2e7db8" stop-opacity="0.08"/>
        </linearGradient>
        <linearGradient id="hFac" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#6a4ab8" stop-opacity="0.42"/>
          <stop offset="100%" stop-color="#6a4ab8" stop-opacity="0.08"/>
        </linearGradient>
        <linearGradient id="hCav" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1e9898" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#1e9898" stop-opacity="0.08"/>
        </linearGradient>
        <linearGradient id="hTid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1e8838" stop-opacity="0.48"/>
          <stop offset="100%" stop-color="#1e8838" stop-opacity="0.09"/>
        </linearGradient>

        <!-- SUN GLOW -->
        <radialGradient id="gSun" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#fff8c0" stop-opacity="0.9"/>
          <stop offset="30%"  stop-color="#ffd060" stop-opacity="0.6"/>
          <stop offset="60%"  stop-color="#ff9020" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#ff9020" stop-opacity="0"/>
        </radialGradient>

        <!-- WATER SHIMMER -->
        <linearGradient id="gShimmer" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#c8e8f8" stop-opacity="0"/>
          <stop offset="40%"  stop-color="#c8e8f8" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#c8e8f8" stop-opacity="0"/>
        </linearGradient>

        <!-- FOAM -->
        <radialGradient id="gFoam">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>

        <!-- TIDEPOOL WATER -->
        <radialGradient id="gPool">
          <stop offset="0%"   stop-color="#48b8d8" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#1878a8" stop-opacity="0.4"/>
        </radialGradient>

        <!-- BASALT COLUMN TEXTURE PATTERN -->
        <pattern id="basalt" x="0" y="0" width="42" height="58"
                 patternUnits="userSpaceOnUse">
          <line x1="0"  y1="0" x2="0"  y2="58" stroke="rgba(180,210,255,0.09)" stroke-width="0.9"/>
          <line x1="14" y1="0" x2="14" y2="58" stroke="rgba(180,210,255,0.07)" stroke-width="0.7"/>
          <line x1="28" y1="0" x2="28" y2="58" stroke="rgba(180,210,255,0.09)" stroke-width="0.9"/>
          <line x1="0" y1="19" x2="42" y2="19" stroke="rgba(180,210,255,0.04)" stroke-width="0.5"/>
          <line x1="0" y1="40" x2="42" y2="40" stroke="rgba(180,210,255,0.04)" stroke-width="0.5"/>
        </pattern>

        <!-- SAND TEXTURE PATTERN -->
        <pattern id="sandTex" x="0" y="0" width="8" height="8"
                 patternUnits="userSpaceOnUse">
          <circle cx="2" cy="3" r="0.5" fill="rgba(140,100,50,0.28)"/>
          <circle cx="6" cy="6" r="0.4" fill="rgba(120,80,40,0.2)"/>
          <circle cx="4" cy="1" r="0.3" fill="rgba(160,120,60,0.22)"/>
        </pattern>

        <!-- CLIP PATH: MAIN ROCK SILHOUETTE -->
        <!-- Haystack Rock profile: tall, slightly wider at base,
             slight right-side overhang, narrow pointed summit -->
        <clipPath id="rcClip">
          <path d="
            M 215,602
            C 210,538 218,468 240,392
            C 258,332 270,268 280,204
            C 295,148 330,102 378,62
            C 404,40 430,27 458,25
            C 478,25 500,37 522,63
            C 545,93 558,132 567,178
            C 578,225 583,270 590,316
            C 596,360 600,402 610,441
            C 622,476 642,506 665,532
            C 688,558 706,573 720,602
            Z
          "/>
        </clipPath>

        <!-- FILTERS -->
        <filter id="fRockGlow" x="-15%" y="-5%" width="135%" height="115%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="b"/>
          <feFlood flood-color="#4878b8" flood-opacity="0.38" result="c"/>
          <feComposite in="c" in2="b" operator="in" result="s"/>
          <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fZoneGlow" x="-8%" y="-8%" width="116%" height="116%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fSunGlow" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="22"/>
        </filter>
        <filter id="fShadow">
          <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.18"/>
        </filter>

      </defs>

      <!-- ============================================================
           LAYER 1: SKY
           ============================================================ -->
      <rect x="0" y="0" width="1200" height="700" fill="url(#gSky)"/>

      <!-- ============================================================
           LAYER 2: SUN (upper left, afternoon)
           ============================================================ -->
      <!-- Outer atmospheric haze -->
      <ellipse cx="105" cy="185" rx="130" ry="130" fill="url(#gSun)"
               filter="url(#fSunGlow)" opacity="0.6"/>
      <!-- Inner glow -->
      <ellipse cx="105" cy="185" rx="55" ry="55" fill="url(#gSun)"
               filter="url(#fSunGlow)" opacity="0.8"/>
      <!-- Sun disk -->
      <circle cx="105" cy="185" r="25" fill="#fff8d0" opacity="0.88"/>

      <!-- Light rays (subtle, from sun toward rock) -->
      <g opacity="0.06">
        <line x1="105" y1="185" x2="450" y2="600" stroke="#ffd060" stroke-width="80"/>
        <line x1="105" y1="185" x2="650" y2="700" stroke="#ffd060" stroke-width="50"/>
      </g>

      <!-- Horizon warm glow -->
      <ellipse cx="600" cy="430" rx="700" ry="90" fill="rgba(215,145,60,0.18)"/>

      <!-- ============================================================
           LAYER 3: CLOUDS
           ============================================================ -->
      <g class="cloud" opacity="0.42">
        <ellipse cx="820" cy="68" rx="90" ry="22" fill="#e8f0f8"/>
        <ellipse cx="790" cy="75" rx="58" ry="19" fill="#eef4fa"/>
        <ellipse cx="860" cy="72" rx="62" ry="17" fill="#e8f0f8"/>
      </g>
      <g class="cloud" opacity="0.35" transform="translate(250,20)">
        <ellipse cx="820" cy="68" rx="75" ry="19" fill="#e8f0f8"/>
        <ellipse cx="800" cy="74" rx="50" ry="16" fill="#eef4fa"/>
        <ellipse cx="850" cy="71" rx="52" ry="15" fill="#e8f0f8"/>
      </g>
      <g class="cloud" opacity="0.28">
        <ellipse cx="1080" cy="110" rx="65" ry="17" fill="#dde8f5"/>
        <ellipse cx="1060" cy="116" rx="42" ry="14" fill="#e8f0f8"/>
        <ellipse cx="1110" cy="113" rx="48" ry="13" fill="#dde8f5"/>
      </g>

      <!-- ============================================================

/* ===== DOM REFERENCES ===== */
var scene     = document.getElementById('scene');
var panel     = document.getElementById('panel');
var panelBar  = document.getElementById('panel-bar');
var panelScrl = document.getElementById('panel-scroll');
var tip       = document.getElementById('tip');
var backBtn   = document.getElementById('back-btn');
var hint      = document.getElementById('hint');
var legend    = document.getElementById('legend');
var hdr       = document.getElementById('hdr');
var active    = null;

/* ===== BUILD PANEL HTML ===== */
function buildPanel(z) {
  var facts = z.facts.map(function(f) {
    return (
      '<div class="fact">' +
        '<div class="fact-ico">' + f.i + '</div>' +
        '<div>' +
          '<div class="fact-name" style="color:' + z.color + '">' + f.n + '</div>' +
          '<div class="fact-body">' + f.t + '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  var species = z.species.map(function(s) {
    return (
      '<div class="sp-card">' +
        '<div class="sp-name">' + s.n + '</div>' +
        '<div class="sp-sci">' + s.s + '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="p-tag" style="color:' + z.color + '">' + z.tag + '</div>' +
    '<div class="p-name" style="color:' + z.color + '">' + z.name + '</div>' +
    '<div class="p-elev">' + z.elev + '</div>' +
    '<div class="p-desc">' + z.desc + '</div>' +
    '<div class="p-section">Field Notes</div>' +
    '<div class="facts">' + facts + '</div>' +
    '<div class="p-section" style="margin-top:16px">Species Observed</div>' +
    '<div class="sp-grid">' + species + '</div>'
  );
}

/* ===== OPEN ZONE ===== */
function openZone(id) {
  var z = Z[id];
  if (!z) return;
  active = id;

  /* Zoom SVG toward this zone's origin */
  scene.style.transformOrigin = z.origin;
  scene.classList.add('zoomed');

  /* Highlight active zone, dim others */
  document.querySelectorAll('.zhit').forEach(function(el) {
    if (el.getAttribute('data-zone') === id) {
      el.classList.add('on');
      el.classList.remove('dim');
    } else {
      el.classList.remove('on');
      el.classList.add('dim');
    }
  });

  /* Build and show panel */
  panelBar.style.background = z.color;
  panelScrl.innerHTML = buildPanel(z);
  panelScrl.scrollTop = 0;
  panel.classList.add('open');

  /* Show/hide UI elements */
  hint.classList.add('gone');
  legend.classList.add('gone');
  backBtn.classList.add('show');
  hdr.classList.add('dim');

  tip.classList.remove('show');
}

/* ===== CLOSE ZONE ===== */
function closeZone() {
  active = null;
  scene.classList.remove('zoomed');
  scene.style.transformOrigin = '';
  panel.classList.remove('open');
  backBtn.classList.remove('show');
  hint.classList.remove('gone');
  legend.classList.remove('gone');
  hdr.classList.remove('dim');
  document.querySelectorAll('.zhit').forEach(function(el) {
    el.classList.remove('on', 'dim');
  });
}

/* ===== WIRE ZONE HOTSPOTS ===== */
document.querySelectorAll('.zhit').forEach(function(el) {
  var id = el.getAttribute('data-zone');
  var z  = Z[id];
  if (!z) return;

  /* Click: open or close */
  el.addEventListener('click', function() {
    if (active === id) { closeZone(); } else { openZone(id); }
  });

  /* Keyboard: Enter / Space */
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (active === id) { closeZone(); } else { openZone(id); }
    }
  });

  /* Tooltip on hover */
  el.addEventListener('mouseenter', function() {
    tip.textContent = z.name;
    tip.style.color = z.color;
    tip.style.borderBottomColor = z.color;
    tip.classList.add('show');
  });

  el.addEventListener('mousemove', function(e) {
    var wrap = document.getElementById('scene-wrap').getBoundingClientRect();
    tip.style.left = (e.clientX - wrap.left) + 'px';
    tip.style.top  = (e.clientY - wrap.top - 50) + 'px';
  });

  el.addEventListener('mouseleave', function() {
    tip.classList.remove('show');
  });
});

/* ===== KEYBOARD: ESC TO CLOSE ===== */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && active) { closeZone(); }
});
