<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #loader {
    position: fixed; inset: 0; background: #020d1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; transition: opacity 1s ease;
  }
  #loader .wave-text {
    font-family: system-ui, sans-serif;
    color: #38bdf8; font-size: 28px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  #loader .sub { color: #64748b; font-family: system-ui; font-size: 13px; margin-top: 10px; letter-spacing: 2px; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  #hint {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    font-family: system-ui, sans-serif; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 1px; pointer-events: none;
    transition: opacity 2s ease; text-align: center;
  }
</style>
</head>
<body>
<div id="loader">
  <div class="wave-text">冒聼聦聤 OCEAN</div>
  <div class="sub">Loading simulation...</div>
</div>
<div id="hint">Tap to create waves &nbsp;脗路&nbsp; Drag to rotate</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

  // 芒聰聙芒聰聙 Scene setup 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020d1a, 0.008);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 18, 55);
  camera.lookAt(0, 0, 0);

  // 芒聰聙芒聰聙 Sky gradient background 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const skyGeo = new THREE.SphereGeometry(800, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: { time: { value: 0 } },
    vertexShader: `
      varying vec3 vPos;
      void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
    `,
    fragmentShader: `
      varying vec3 vPos;
      uniform float time;
      void main() {
        float t = normalize(vPos).y * 0.5 + 0.5;
        vec3 horizon = vec3(0.05, 0.18, 0.38);
        vec3 zenith  = vec3(0.01, 0.06, 0.18);
        vec3 sunDir  = normalize(vec3(0.4, 0.25, -1.0));
        float sun = pow(max(dot(normalize(vPos), sunDir), 0.0), 120.0);
        vec3 sky = mix(horizon, zenith, t);
        sky += vec3(1.0, 0.85, 0.5) * sun * 2.5;
        gl_FragColor = vec4(sky, 1.0);
      }
    `
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // 芒聰聙芒聰聙 Lighting 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  scene.add(new THREE.AmbientLight(0x112244, 1.2));
  const sun = new THREE.DirectionalLight(0xffd580, 2.0);
  sun.position.set(80, 60, -120);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x4488bb, 0.4);
  fill.position.set(-50, 30, 50);
  scene.add(fill);

  // 芒聰聙芒聰聙 Water shader 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const WATER_SIZE = 300;
  const waterGeo = new THREE.PlaneGeometry(WATER_SIZE, WATER_SIZE, 128, 128);

  // Store up to 8 simultaneous ripples
  const MAX_RIPPLES = 8;
  const ripplePos   = new Float32Array(MAX_RIPPLES * 2);   // x,z pairs
  const rippleTime  = new Float32Array(MAX_RIPPLES);
  const rippleStrength = new Float32Array(MAX_RIPPLES);
  let rippleIndex = 0;

  const waterUniforms = {
    time:          { value: 0 },
    sunDir:        { value: new THREE.Vector3(0.4, 0.6, -1.0).normalize() },
    cameraPos:     { value: camera.position },
    ripplePos:     { value: ripplePos },
    rippleTime:    { value: rippleTime },
    rippleStrength:{ value: rippleStrength },
  };

  const waterMat = new THREE.ShaderMaterial({
    uniforms: waterUniforms,
    vertexShader: `
      uniform float time;
      uniform float ripplePos[${MAX_RIPPLES * 2}];
      uniform float rippleTime[${MAX_RIPPLES}];
      uniform float rippleStrength[${MAX_RIPPLES}];

      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying float vFoam;

      // Gerstner wave
      vec3 gerstner(vec3 p, vec2 dir, float amp, float freq, float speed, float steep, float t) {
        float phase = dot(dir, p.xz) * freq + t * speed;
        float c = cos(phase); float s = sin(phase);
        return vec3(
          steep * amp * dir.x * c,
          amp * s,
          steep * amp * dir.y * c
        );
      }

      void main() {
        vec3 pos = position;
        float foam = 0.0;

        // Sum of Gerstner waves
        vec3 w  = gerstner(pos, normalize(vec2(1.0, 0.6)),  1.8, 0.03, 0.9, 0.5, time);
        vec3 w2 = gerstner(pos, normalize(vec2(-0.7, 1.0)), 1.2, 0.05, 1.2, 0.4, time);
        vec3 w3 = gerstner(pos, normalize(vec2(0.3, -1.0)), 0.7, 0.08, 1.8, 0.3, time);
        vec3 w4 = gerstner(pos, normalize(vec2(1.0, -0.4)), 0.4, 0.12, 2.2, 0.2, time);
        vec3 w5 = gerstner(pos, normalize(vec2(-0.5,-0.8)), 0.25,0.18, 2.8, 0.15,time);

        pos += w + w2 + w3 + w4 + w5;
        foam = max(0.0, (pos.y - 1.5) / 2.5);

        // Ripple displacement
        for (int i = 0; i < ${MAX_RIPPLES}; i++) {
          float rx = ripplePos[i * 2];
          float rz = ripplePos[i * 2 + 1];
          float rt = rippleTime[i];
          float rs = rippleStrength[i];
          if (rs < 0.001) continue;
          float dist = length(vec2(position.x - rx, position.z - rz));
          float waveFront = dist - rt * 18.0;
          float ripple = sin(waveFront * 0.8) * exp(-abs(waveFront) * 0.12) * exp(-dist * 0.015);
          pos.y += ripple * rs * 3.5;
        }

        vWorldPos = pos;
        vFoam = foam;

        // Approximate normal from neighbours
        float eps = 0.5;
        vec3 px = position + vec3(eps, 0, 0);
        vec3 pz = position + vec3(0, 0, eps);
        vec3 wx  = gerstner(px, normalize(vec2(1.0,0.6)),  1.8,0.03,0.9,0.5,time)
                 + gerstner(px, normalize(vec2(-0.7,1.0)), 1.2,0.05,1.2,0.4,time)
                 + gerstner(px, normalize(vec2(0.3,-1.0)), 0.7,0.08,1.8,0.3,time);
        vec3 wz  = gerstner(pz, normalize(vec2(1.0,0.6)),  1.8,0.03,0.9,0.5,time)
                 + gerstner(pz, normalize(vec2(-0.7,1.0)), 1.2,0.05,1.2,0.4,time)
                 + gerstner(pz, normalize(vec2(0.3,-1.0)), 0.7,0.08,1.8,0.3,time);
        vec3 tangentX = normalize(vec3(eps,0,0) + wx - w);
        vec3 tangentZ = normalize(vec3(0,0,eps) + wz - w);
        vNormal = normalize(cross(tangentZ, tangentX));

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      uniform vec3 sunDir;
      uniform vec3 cameraPos;

      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying float vFoam;

      // Simple hash for sparkle
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      void main() {
        vec3 N = normalize(vNormal);
        vec3 V = normalize(cameraPos - vWorldPos);
        vec3 L = sunDir;
        vec3 H = normalize(L + V);

        // Deep water color
        vec3 deepColor    = vec3(0.01, 0.08, 0.22);
        vec3 shallowColor = vec3(0.04, 0.26, 0.52);
        vec3 waterColor   = mix(deepColor, shallowColor, max(0.0, N.y));

        // Fresnel
        float fresnel = pow(1.0 - max(dot(N, V), 0.0), 4.0);
        fresnel = mix(0.02, 1.0, fresnel);

        // Sky reflection color
        vec3 R = reflect(-V, N);
        vec3 skyColor = mix(vec3(0.05,0.18,0.38), vec3(0.01,0.06,0.18), clamp(R.y*0.5+0.5, 0.0, 1.0));
        float sunRefl = pow(max(dot(R, L), 0.0), 60.0);
        skyColor += vec3(1.0, 0.9, 0.6) * sunRefl * 2.0;

        // Specular highlight
        float spec = pow(max(dot(N, H), 0.0), 180.0) * 3.0;

        // Sparkles
        float sp = hash(floor(vWorldPos.xz * 3.0 + time * 0.5));
        float sparkle = step(0.97, sp) * max(dot(N, L), 0.0) * 0.6;

        vec3 color = mix(waterColor, skyColor, fresnel);
        color += vec3(1.0, 0.95, 0.8) * spec;
        color += vec3(1.0, 1.0, 0.9) * sparkle;

        // Foam on wave crests
        color = mix(color, vec3(0.85, 0.92, 0.98), vFoam * 0.6);

        // Subsurface scattering approximation
        float sss = pow(max(dot(L, -N), 0.0), 2.0) * 0.3;
        color += vec3(0.02, 0.12, 0.25) * sss;

        // Depth fog (edges of plane fade)
        float edgeDist = length(vWorldPos.xz) / (${WATER_SIZE.toFixed(1)} * 0.48);
        color = mix(color, vec3(0.01, 0.04, 0.12), smoothstep(0.7, 1.0, edgeDist));

        gl_FragColor = vec4(color, 1.0);
      }
    `
  });

  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  // 芒聰聙芒聰聙 Distant fog plane (ocean horizon) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const horizonGeo = new THREE.PlaneGeometry(2000, 2000);
  const horizonMat = new THREE.MeshBasicMaterial({ color: 0x020d1a, side: THREE.DoubleSide });
  const horizon = new THREE.Mesh(horizonGeo, horizonMat);
  horizon.rotation.x = -Math.PI / 2;
  horizon.position.y = -2;
  scene.add(horizon);

  // 芒聰聙芒聰聙 Camera orbit controls (touch + mouse) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  let isDragging = false;
  let lastX = 0, lastY = 0;
  let theta = 0, phi = 0.38;
  const radius = 60;
  const target = new THREE.Vector3(0, 0, 0);

  function updateCamera() {
    camera.position.set(
      target.x + radius * Math.sin(theta) * Math.cos(phi),
      target.y + radius * Math.sin(phi),
      target.z + radius * Math.cos(theta) * Math.cos(phi)
    );
    camera.lookAt(target);
  }
  updateCamera();

  // Mouse
  renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    theta -= (e.clientX - lastX) * 0.006;
    phi = Math.max(0.05, Math.min(1.2, phi - (e.clientY - lastY) * 0.006));
    lastX = e.clientX; lastY = e.clientY;
    updateCamera();
  });

  // Touch drag
  let lastTouchX = 0, lastTouchY = 0;
  let touchStartX = 0, touchStartY = 0;
  let touchMoved = false;
  renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      lastTouchX = touchStartX = e.touches[0].clientX;
      lastTouchY = touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - lastTouchX;
      const dy = e.touches[0].clientY - lastTouchY;
      if (Math.abs(e.touches[0].clientX - touchStartX) > 8 || Math.abs(e.touches[0].clientY - touchStartY) > 8) touchMoved = true;
      theta -= dx * 0.006;
      phi = Math.max(0.05, Math.min(1.2, phi - dy * 0.006));
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      updateCamera();
    }
  }, { passive: true });

  // 芒聰聙芒聰聙 Ripple spawning 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function spawnRipple(worldX, worldZ, strength = 1.0) {
    const i = rippleIndex % MAX_RIPPLES;
    ripplePos[i * 2]     = worldX;
    ripplePos[i * 2 + 1] = worldZ;
    rippleTime[i]         = 0;
    rippleStrength[i]     = strength;
    rippleIndex++;
  }

  function getWorldXZ(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    const ndc = new THREE.Vector2(
      ((clientX - rect.left) / rect.width)  * 2 - 1,
      -((clientY - rect.top)  / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(ndc, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, pt);
    return pt;
  }

  // Click ripple
  renderer.domElement.addEventListener('click', e => {
    const pt = getWorldXZ(e.clientX, e.clientY);
    if (pt) spawnRipple(pt.x, pt.z, 1.0);
    hintFade();
  });

  // Touch tap ripple (only if not a drag)
  renderer.domElement.addEventListener('touchend', e => {
    if (!touchMoved && e.changedTouches.length === 1) {
      const pt = getWorldXZ(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      if (pt) spawnRipple(pt.x, pt.z, 1.0);
      hintFade();
    }
  });

  // Spawn a few auto-ripples early so it looks alive
  setTimeout(() => spawnRipple( 10, -8,  0.7), 500);
  setTimeout(() => spawnRipple(-15,  5,  0.5), 1200);
  setTimeout(() => spawnRipple(  5, 12,  0.6), 2000);

  // 芒聰聙芒聰聙 Hint fade 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const hint = document.getElementById('hint');
  let hinted = false;
  function hintFade() {
    if (hinted) return;
    hinted = true;
    hint.style.opacity = '0';
  }
  setTimeout(hintFade, 6000);

  // 芒聰聙芒聰聙 Loader fade 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const loader = document.getElementById('loader');
  setTimeout(() => {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 1000);
  }, 800);

  // 芒聰聙芒聰聙 Resize 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 芒聰聙芒聰聙 Animation loop 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  let prevTime = performance.now();
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt  = (now - prevTime) / 1000;
    prevTime  = now;

    waterUniforms.time.value += dt * 0.6;
    skyMat.uniforms.time.value = waterUniforms.time.value;

    // Age ripples
    for (let i = 0; i < MAX_RIPPLES; i++) {
      if (rippleStrength[i] > 0.001) {
        rippleTime[i]     += dt;
        rippleStrength[i]  *= Math.pow(0.35, dt);
        if (rippleStrength[i] < 0.001) rippleStrength[i] = 0;
      }
    }

    // Gentle auto camera drift
    theta += dt * 0.012;
    updateCamera();

    renderer.render(scene, camera);
  }
  animate();

})();
</script>
