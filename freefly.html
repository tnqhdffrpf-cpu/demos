<style>

  /* ГўВ”ВЂГўВ”ВЂ Start Overlay ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */

  /* ГўВ”ВЂГўВ”ВЂ HUD ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
  #hud {

  #region-label {

    text-transform: uppercase;
  }

  /* ГўВ”ВЂГўВ”ВЂ Touch zones (desktop visual guide) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
  #touch-left, #touch-right {

  }
  #touch-left  { left: 0;  background: linear-gradient(to right, rgba(80,160,255,0.12), transparent); }

<!-- Three.js r128 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';
// ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ
//  FREE FLIGHT  ГўВЂВ”  Relaxing Biplane
//  Architecture:
//    1. Config & helpers
//    2. Renderer / scene / camera
//    3. Lighting & atmosphere
//    4. Terrain (height function + mesh + vertex colors)
//    5. Forest  (instanced trees, forest region)
//    6. City    (instanced buildings, city region)
//    7. Clouds  (instanced)
//    8. Biplane model (procedural geometry)
//    9. Input   (DeviceOrientation + touch + mouse)
//   10. Game loop (physics, camera, HUD)
// ГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•ВђГўВ•Вђ


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 1. Config ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
const CFG = {
  worldSize:    3600,     // full extent of terrain (units)
  planeSpeed:   70,       // forward speed (units/sec)
  turnGain:     2.0,      // tilt ГўВ†В’ turn rate amplification
  inputSmooth:  0.06,     // input smoothing (higher = snappier)
  bankMult:     1.05,     // visual bank exaggeration factor
  bankSmooth:   0.13,     // bank visual smoothing speed
  cameraSmooth: 0.068,    // camera position lerp
  lookSmooth:   0.10,     // camera look-at lerp
  camDist:      26,       // distance behind plane
  camHeight:    9,        // height above plane
  targetAlt:    115,      // desired altitude above terrain
  altSmooth:    0.010,    // altitude correction speed (used when not pitching)
  tiltClamp:    45,       // max degrees of gamma tilt used for turning
  pitchClamp:   30,       // max degrees of beta deviation = full pitch
  pitchGain:    60,       // altitude change speed at max pitch (units/sec)
  pitchSmooth:  0.07,     // pitch input smoothing
};

// Seeded RNG ГўВЂВ” ensures the world looks the same every load
function rng(seed) {
  let s = seed >>> 0;
  return () => {
    s = Math.imul(s ^ (s >>> 15), s | 1);
    s ^= s + Math.imul(s ^ (s >>> 7), s | 61);
    return ((s ^ (s >>> 14)) >>> 0) / 4294967296;
  };
}


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 2. Renderer / Scene / Camera ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
const renderer = new THREE.WebGLRenderer({
  antialias:        false,             // off for mobile perf
  powerPreference:  'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  62, window.innerWidth / window.innerHeight, 1, 4500
);

// Skybox color & fog
scene.background = new THREE.Color(0x7ec8f0);
scene.fog         = new THREE.FogExp2(0x99d4f0, 0.00042);


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 3. Lighting & Atmosphere ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
// Warm ambient
scene.add(new THREE.AmbientLight(0xffe8cc, 0.60));

// Main sun
const sun = new THREE.DirectionalLight(0xfff5e0, 1.15);
sun.position.set(400, 600, 150);
scene.add(sun);

// Soft sky fill from above
const skyFill = new THREE.DirectionalLight(0xaad4ff, 0.25);
skyFill.position.set(-100, 200, -300);
scene.add(skyFill);

// Sun disc in sky
const sunDisc = new THREE.Mesh(
  new THREE.SphereGeometry(22, 10, 8),
  new THREE.MeshBasicMaterial({ color: 0xfff9cc })
);
sunDisc.position.set(700, 600, -900);
scene.add(sunDisc);

// Horizon haze plane (large translucent quad near horizon)
const hazeMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(8000, 400),
  new THREE.MeshBasicMaterial({
    color: 0xb8e0ff, transparent: true, opacity: 0.18, depthWrite: false
  })
);
hazeMesh.rotation.x = -Math.PI / 2;
hazeMesh.position.set(0, 20, 0);
scene.add(hazeMesh);


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 4. Terrain ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
/**
 * Deterministic terrain height function.
 * Forest region:  x < 0       (hilly, green)
 * Valley:         0 < x < 350 (gently rolling)
 * City:           x > 350     (mostly flat)
 */
function getHeight(x, z) {
  let h = 0;
  h += Math.sin(x * 0.0030) * Math.cos(z * 0.0028) * 24;
  h += Math.sin(x * 0.0068 + 1.3) * Math.sin(z * 0.0055 + 0.8) * 14;
  h += Math.sin(x * 0.0150 + 0.4) * 7;
  h += Math.cos(z * 0.0120 + 0.6) * 5;
  // Mountains on the far-left
  const mtn = Math.max(0, -x - 600);
  h += Math.sin(x * 0.004) * Math.cos(z * 0.004) * mtn * 0.12;
  // Flatten for city (right side)
  if (x > 180) h *= Math.max(0, 1 - (x - 180) / 500);
  return h;
}

// Build terrain geometry
const T_SEGS  = 110;
const terrGeo = new THREE.PlaneGeometry(CFG.worldSize, CFG.worldSize, T_SEGS, T_SEGS);
terrGeo.rotateX(-Math.PI / 2);

const vPos    = terrGeo.attributes.position;
const vColor  = new Float32Array(vPos.count * 3);

for (let i = 0; i < vPos.count; i++) {
  const x = vPos.getX(i), z = vPos.getZ(i);
  const h = getHeight(x, z);
  vPos.setY(i, h);

  // Terrain color: blend from forest green ГўВ†В’ grey city
  const cityT = Math.max(0, Math.min(1, (x - 80) / 500));  // 0 = forest, 1 = city
  const snowT  = Math.max(0, (h - 55) / 40);               // snow at peaks

  // Forest green
  let r = 0.18 + h * 0.004 + cityT * 0.35;
  let g = 0.50 + h * 0.004 - cityT * 0.10;
  let b = 0.12 + cityT * 0.35;

  // Snow cap blend
  r = r + snowT * (0.92 - r);
  g = g + snowT * (0.95 - g);
  b = b + snowT * (0.98 - b);

  vColor[i * 3    ] = Math.max(0, Math.min(1, r));
  vColor[i * 3 + 1] = Math.max(0, Math.min(1, g));
  vColor[i * 3 + 2] = Math.max(0, Math.min(1, b));
}
vPos.needsUpdate = true;
terrGeo.setAttribute('color', new THREE.BufferAttribute(vColor, 3));
terrGeo.computeVertexNormals();

scene.add(new THREE.Mesh(
  terrGeo,
  new THREE.MeshLambertMaterial({ vertexColors: true })
));


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 5. Forest (Instanced Trees) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
(function buildForest() {
  const N   = 1100;
  const r   = rng(42001);

  // Foliage: cone, 6-sided for low poly look
  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x2d7045 });
  const trunkMat   = new THREE.MeshLambertMaterial({ color: 0x5c3210 });
  const foliage2   = new THREE.MeshLambertMaterial({ color: 0x3a8a50 }); // lighter variant

  const foliageInst  = new THREE.InstancedMesh(new THREE.ConeGeometry(5.5, 15, 6),  foliageMat, N);
  const foliage2Inst = new THREE.InstancedMesh(new THREE.ConeGeometry(4.2, 11, 6),  foliage2,   N);
  const trunkInst    = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.85, 1.3, 9, 5), trunkMat, N);

  foliageInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  foliage2Inst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  trunkInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);

  const dummy = new THREE.Object3D();

  for (let i = 0; i < N; i++) {
    // Forest region: x ГўВ€В€ [-1700, 100], z spread across world
    const x  = -1700 + r() * 1850;
    const z  = (r() - 0.5) * CFG.worldSize * 0.92;
    const sc = 0.55 + r() * 1.05;
    const gH = getHeight(x, z);
    const ry = r() * Math.PI * 2;

    // Trunk
    dummy.position.set(x, gH + 4.5 * sc, z);
    dummy.scale.setScalar(sc);
    dummy.rotation.y = ry;
    dummy.updateMatrix();
    trunkInst.setMatrixAt(i, dummy.matrix);

    // Main foliage cone
    dummy.position.set(x, gH + 15 * sc, z);

  scene.add(foliageInst, foliage2Inst, trunkInst);
})();


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 6. City (Instanced Buildings + Roads) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
(function buildCity() {
  const N = 340;
  const r = rng(77002);

  // Buildings ГўВЂВ” single instanced mesh with grey material
  const buildMat  = new THREE.MeshLambertMaterial({ color: 0x7a8899 });
  const buildInst = new THREE.InstancedMesh(new THREE.BoxGeometry(1, 1, 1), buildMat, N);
  buildInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);

  const dummy = new THREE.Object3D();
  let   idx   = 0;

  // City occupies x: 380ГўВЂВ“1480, z: -600ГўВЂВ“540 (roughly 1100ГѓВ—1140 block grid)
  for (let gx = 0; gx < 17 && idx < N; gx++) {
    for (let gz = 0; gz < 20 && idx < N; gz++) {
      const x      = 380  + gx * 64 + (r() - 0.5) * 16;
      const z      = -600 + gz * 57 + (r() - 0.5) * 16;
      const w      = 16   + r() * 26;
      const d      = 16   + r() * 26;
      // Taller buildings toward center of city
      const distC  = Math.hypot(gx - 8, gz - 10) / 14;
      const height = 12 + Math.pow(r(), 1.2) * (80 - distC * 50);
      const gH     = getHeight(x, z);

      dummy.position.set(x, gH + height * 0.5, z);
      dummy.scale.set(w, height, d);
      dummy.rotation.y = (r() - 0.5) * 0.35;
      dummy.updateMatrix();
      buildInst.setMatrixAt(idx++, dummy.matrix);
    }
  }
  buildInst.count = idx;
  buildInst.instanceMatrix.needsUpdate = true;
  scene.add(buildInst);

  // Road grid (flat boxes on city terrain)
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x2e2e3a });
  const cityOriginZ = -600, cityWidth = 1140;
  // Horizontal roads (along X axis)
  for (let i = 0; i <= 6; i++) {
    const z   = cityOriginZ + (i / 6) * cityWidth;
    const gH  = getHeight(930, z);
    const rd  = new THREE.Mesh(new THREE.BoxGeometry(1200, 0.6, 8), roadMat);
    rd.position.set(930, gH + 0.4, z);
    scene.add(rd);
  }
  // Vertical roads (along Z axis)
  for (let i = 0; i <= 6; i++) {
    const x  = 380 + i * 180;
    const gH = getHeight(x, -30);
    const rd = new THREE.Mesh(new THREE.BoxGeometry(8, 0.6, 1200), roadMat);
    rd.position.set(x, gH + 0.4, -30);
    scene.add(rd);
  }
})();


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 7. Clouds (Instanced) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 8. Biplane Model ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function buildBiplane() {
  const root = new THREE.Group();

  // Materials
  const M = {
    body:   new THREE.MeshLambertMaterial({ color: 0xf0a818 }), // golden yellow
    wing:   new THREE.MeshLambertMaterial({ color: 0xd08810 }), // darker wing
    red:    new THREE.MeshLambertMaterial({ color: 0xcc2230 }), // accent red
    glass:  new THREE.MeshLambertMaterial({ color: 0x99ccff, transparent: true, opacity: 0.65 }),
    metal:  new THREE.MeshLambertMaterial({ color: 0x909090 }),
    dark:   new THREE.MeshLambertMaterial({ color: 0x222222 }),
    white:  new THREE.MeshLambertMaterial({ color: 0xfafafa }),
  };

  // Helper: add mesh to root
  function part(geo, mat, px=0,py=0,pz=0, rx=0,ry=0,rz=0, sx=1,sy=1,sz=1) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px, py, pz);
    m.rotation.set(rx, ry, rz);
    m.scale.set(sx, sy, sz);
    root.add(m);
    return m;
  }

  // ГўВЂВ” Fuselage (main body)
  part(new THREE.BoxGeometry(2.0, 1.7, 8.5), M.body);
  // ГўВЂВ” Nose taper
  part(new THREE.CylinderGeometry(0.38, 0.95, 2.4, 8), M.body, 0, 0, -5.2, Math.PI/2);
  // ГўВЂВ” Tail fairing (taper at rear)
  part(new THREE.BoxGeometry(1.2, 1.05, 2.8), M.body, 0, -0.15, 3.8);

  // ГўВЂВ” Upper wing
  part(new THREE.BoxGeometry(16, 0.28, 2.5), M.wing, 0, 1.9, -0.5);
  // ГўВЂВ” Lower wing
  part(new THREE.BoxGeometry(13.5, 0.22, 2.1), M.wing, 0, -0.2, -0.5);

  // ГўВЂВ” Red accent stripes on upper wing
  part(new THREE.BoxGeometry(2.4, 0.32, 2.5), M.red, -3.8, 1.91, -0.5);
  part(new THREE.BoxGeometry(2.4, 0.32, 2.5), M.red,  3.8, 1.91, -0.5);
  // ГўВЂВ” White tip stripes
  part(new THREE.BoxGeometry(1.2, 0.30, 2.5), M.white, -7.2, 1.91, -0.5);
  part(new THREE.BoxGeometry(1.2, 0.30, 2.5), M.white,  7.2, 1.91, -0.5);

  // ГўВЂВ” Wing struts (4 interplane struts)
  const strutGeo = new THREE.BoxGeometry(0.24, 2.1, 0.24);
  for (const sx of [-3.0, 3.0]) {
    for (const sz of [0.3, 1.8]) {
      part(strutGeo, M.metal, sx, 0.85, sz);
    }
  }

  // ГўВЂВ” Horizontal stabilizer
  part(new THREE.BoxGeometry(7.2, 0.22, 1.7), M.wing, 0, 0.22, 3.5);
  // ГўВЂВ” Vertical fin
  part(new THREE.BoxGeometry(0.22, 2.2, 1.8), M.wing, 0, 1.2, 3.4);
  // ГўВЂВ” Rudder hint
  part(new THREE.BoxGeometry(0.18, 1.6, 0.8), M.red, 0, 1.0, 4.2);

  // ГўВЂВ” Cockpit opening
  part(new THREE.BoxGeometry(1.35, 1.0, 1.7), M.glass, 0, 1.2, 0.15);

  // ГўВЂВ” Pilot silhouette (simple)
  part(new THREE.SphereGeometry(0.45, 6, 5), M.dark, 0, 1.95, 0.3);
  part(new THREE.BoxGeometry(0.7, 0.6, 0.5), M.dark, 0, 1.55, 0.3);

  // ГўВЂВ” Engine cowling ring
  part(new THREE.TorusGeometry(0.88, 0.18, 8, 12), M.metal, 0, 0, -4.25, Math.PI/2);

  // ГўВЂВ” Propeller assembly (spins)
  const propGroup = new THREE.Group();
  propGroup.position.z = -6.0;
  // Hub
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.7, 8), M.metal);
  hub.rotation.x = Math.PI / 2;
  propGroup.add(hub);
  // Two blades
  const bladeGeo = new THREE.BoxGeometry(0.32, 4.2, 0.14);
  const b1 = new THREE.Mesh(bladeGeo, M.dark);
  const b2 = b1.clone(); b2.rotation.z = Math.PI / 2;
  // Blade tips
  const tipGeo = new THREE.BoxGeometry(0.5, 0.9, 0.14);
  const t1 = new THREE.Mesh(tipGeo, M.red); t1.position.y = 2.2;
  const t2 = t1.clone(); t2.position.y = -2.2;
  const t3 = new THREE.Mesh(tipGeo, M.red); t3.position.x = 2.2;
  const t4 = t3.clone(); t4.position.x = -2.2;
  b1.add(t1, t2); b2.add(t3, t4);
  propGroup.add(b1, b2);
  root.add(propGroup);
  root.userData.propeller = propGroup;

  // ГўВЂВ” Landing gear
  const wheelGeo = new THREE.TorusGeometry(0.58, 0.21, 6, 10);
  for (const wx of [-1.7, 1.7]) {
    // Axle strut
    part(new THREE.BoxGeometry(0.18, 1.5, 0.18), M.metal, wx, -1.55, -1.9);
    // Cross brace
    part(new THREE.BoxGeometry(3.4, 0.18, 0.18), M.metal, 0, -2.3, -1.9);
    // Wheel
    const wheel = new THREE.Mesh(wheelGeo, M.dark);
    wheel.position.set(wx, -2.4, -1.9);
    wheel.rotation.y = Math.PI / 2;
    root.add(wheel);
  }

  return root;
}

const biplane = buildBiplane();
biplane.position.set(-500, 125, -300);
scene.add(biplane);


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 9. Input ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
let rawGamma    = 0;   // device left/right tilt (degrees). Positive = right
let rawBeta     = 0;   // device forward/back tilt (degrees)
let pitchNeutral = 65; // beta at game-start = level flight
let touchDir    = 0;   // -1 = left, 0 = neutral, 1 = right
let smoothTurn  = 0;   // final smoothed turn value passed to physics
let smoothPitch = 0;   // final smoothed pitch value
let motionReady = false;

// Device orientation (iPhone gyro)
function onOrientation(evt) {
  rawGamma = evt.gamma ?? 0;
  rawBeta  = evt.beta  ?? pitchNeutral;
}

// Touch (mobile fallback / desktop testing)
const cvs = renderer.domElement;
function getTouchDir(clientX) { return clientX < window.innerWidth * 0.5 ? -1 : 1; }

const leftEl  = document.getElementById('touch-left');
const rightEl = document.getElementById('touch-right');
function showTouchFeedback(dir) {
  leftEl.classList.toggle('active',  dir === -1);
  rightEl.classList.toggle('active', dir ===  1);
}

cvs.addEventListener('touchstart', e => {
  touchDir = getTouchDir(e.touches[0].clientX);
  showTouchFeedback(touchDir);
}, { passive: true });
cvs.addEventListener('touchmove', e => {
  touchDir = getTouchDir(e.touches[0].clientX);
  showTouchFeedback(touchDir);
}, { passive: true });
cvs.addEventListener('touchend', () => {
  touchDir = 0; showTouchFeedback(0);
}, { passive: true });
cvs.addEventListener('mousedown', e => {
  touchDir = getTouchDir(e.clientX); showTouchFeedback(touchDir);
});
cvs.addEventListener('mouseup',    () => { touchDir = 0; showTouchFeedback(0); });
cvs.addEventListener('mouseleave', () => { touchDir = 0; showTouchFeedback(0); });


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Start button ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
document.getElementById('startBtn').addEventListener('click', async () => {
  // iOS 13+ requires explicit permission for DeviceOrientationEvent
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        window.addEventListener('deviceorientation', onOrientation, true);
        motionReady = true;
      }
    } catch (err) {
      // Permission denied or not available ГўВЂВ” fall back to touch
    }
  } else {
    // Android / desktop: orientation events don't need permission
    window.addEventListener('deviceorientation', onOrientation, true);
    motionReady = true;
  }

  document.getElementById('overlay').style.display = 'none';
  // Calibrate pitch neutral to wherever phone is held at launch
  if (rawBeta !== 0) pitchNeutral = rawBeta;
  gameStarted = true;
  clock.start();
});


// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ 10. Game Loop ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
let gameStarted = false;
let yaw         = Math.PI * 0.5;  // initial heading (facing roughly west)
let bobTime     = 0;
const clock     = new THREE.Clock(false);

// Camera state vectors ГўВЂВ” lerped each frame
const camPos    = new THREE.Vector3();
const camLook   = new THREE.Vector3();

// Initialize camera behind the plane
{
  const initCamX = biplane.position.x + Math.sin(yaw) * CFG.camDist;
  const initCamZ = biplane.position.z + Math.cos(yaw) * CFG.camDist;
  camPos.set(initCamX, biplane.position.y + CFG.camHeight, initCamZ);
  camLook.copy(biplane.position);
  camera.position.copy(camPos);
  camera.lookAt(camLook);
}

// Region label for HUD
const regionEl = document.getElementById('region-label');
function updateRegion(x) {
  if      (x > 350)  regionEl.textContent = 'Flying over the city';
  else if (x < -200) regionEl.textContent = 'Flying over the forest';
  else if (x < -900) regionEl.textContent = 'Flying over the mountains';
  else               regionEl.textContent = 'Flying over the valley';
}

// Main animation loop
function animate() {
  requestAnimationFrame(animate);

  if (!gameStarted) {
    // Idle: slowly orbit camera around the plane for the title screen
    const t   = Date.now() * 0.00025;
    const orb = 32;
    camera.position.set(
      biplane.position.x + Math.sin(t) * orb,
      biplane.position.y + 14,
      biplane.position.z + Math.cos(t) * orb
    );
    camera.lookAt(biplane.position);
    biplane.userData.propeller.rotation.z += 0.04;
    renderer.render(scene, camera);
    return;
  }

  const dt = Math.min(clock.getDelta(), 0.05);

  // ГўВ”ВЂГўВ”ВЂ Compute steering input ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  // Prefer gyro if tilt is meaningful; otherwise use touch/mouse
  let rawInput = 0;
  if (motionReady && Math.abs(rawGamma) > 1.5) {
    // Clamp physical tilt to Г‚В±CFG.tiltClamp degrees ГўВ†В’ map to Г‚В±1
    rawInput = Math.max(-1, Math.min(1, rawGamma / CFG.tiltClamp));
  } else {
    rawInput = touchDir;
  }

  // Apply gain and smooth
  const targetTurn = rawInput * CFG.turnGain;
  smoothTurn += (targetTurn - smoothTurn) * CFG.inputSmooth;

  // ГўВ”ВЂГўВ”ВЂ Heading ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  yaw -= smoothTurn * dt;

  // ГўВ”ВЂГўВ”ВЂ Forward vector (plane moves in -Z local = -sin(yaw), -cos(yaw)) ГўВ”ВЂГўВ”ВЂ
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);

  // ГўВ”ВЂГўВ”ВЂ Translate plane ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  biplane.position.x += fwdX * CFG.planeSpeed * dt;
  biplane.position.z += fwdZ * CFG.planeSpeed * dt;

  // ГўВ”ВЂГўВ”ВЂ Pitch from phone forward/back tilt (beta) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  bobTime += dt;
  let rawPitchInput = 0;
  if (motionReady) {
    // Tilt top toward you = nose up = climb, tilt away = nose down = dive
    rawPitchInput = Math.max(-1, Math.min(1, (rawBeta - pitchNeutral) / CFG.pitchClamp));
  }
  smoothPitch += (rawPitchInput - smoothPitch) * CFG.pitchSmooth;
  biplane.position.y += smoothPitch * CFG.pitchGain * dt;

  // ГўВ”ВЂГўВ”ВЂ Altitude floor + gentle return to cruise when level ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  const gH = getHeight(biplane.position.x, biplane.position.z);
  const floorY = gH + 30;
  if (biplane.position.y < floorY) biplane.position.y += (floorY - biplane.position.y) * 0.12;
  if (!motionReady || Math.abs(rawPitchInput) < 0.12) {
    const wantY = gH + CFG.targetAlt;
    biplane.position.y += (wantY - biplane.position.y) * CFG.altSmooth;
  }

  // ГўВ”ВЂГўВ”ВЂ World wrap ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  const half = CFG.worldSize * 0.48;
  if (biplane.position.x >  half) biplane.position.x -= CFG.worldSize * 0.96;
  if (biplane.position.x < -half) biplane.position.x += CFG.worldSize * 0.96;
  if (biplane.position.z >  half) biplane.position.z -= CFG.worldSize * 0.96;
  if (biplane.position.z < -half) biplane.position.z += CFG.worldSize * 0.96;

  // ГўВ”ВЂГўВ”ВЂ Apply plane rotation ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  biplane.rotation.y = yaw;

  // Visual bank: lean into turn (exaggerated for satisfying feel)
  const targetBank = -smoothTurn * CFG.bankMult;
  biplane.rotation.z += (targetBank - biplane.rotation.z) * CFG.bankSmooth;

  // Nose pitches with altitude input + subtle idle bob
  biplane.rotation.x = -smoothPitch * 0.5 + Math.sin(bobTime * 0.55) * 0.018;

  // ГўВ”ВЂГўВ”ВЂ Spin propeller (speed proportional to smoothTurn for drama) ГўВ”ВЂ
  biplane.userData.propeller.rotation.z += dt * (20 + Math.abs(smoothTurn) * 2);

  // ГўВ”ВЂГўВ”ВЂ Chase camera ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  // Camera sits behind (opposite of forward direction) + height offset
  const targetCamX = biplane.position.x - fwdX * (-CFG.camDist); // = + fwdX * dist (behind)
  const targetCamZ = biplane.position.z - fwdZ * (-CFG.camDist);
  // Slight lateral lag: camera trails the turn a bit
  const targetCam = new THREE.Vector3(
    biplane.position.x + Math.sin(yaw) * CFG.camDist,
    biplane.position.y + CFG.camHeight,
    biplane.position.z + Math.cos(yaw) * CFG.camDist
  );
  camPos.lerp(targetCam, CFG.cameraSmooth);
  camera.position.copy(camPos);

  // Look slightly ahead of the plane for a cinematic angle
  const lookAhead = 18;
  const targetLook = new THREE.Vector3(
    biplane.position.x + fwdX * lookAhead,
    biplane.position.y - 1,
    biplane.position.z + fwdZ * lookAhead
  );
  camLook.lerp(targetLook, CFG.lookSmooth);
  camera.lookAt(camLook);

  // ГўВ”ВЂГўВ”ВЂ HUD update ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  updateRegion(biplane.position.x);

  renderer.render(scene, camera);
}

// ГўВ”ВЂГўВ”ВЂ Window resize ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Kick off the loop
animate();
</script>
