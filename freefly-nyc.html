<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.72); color:#fff; text-align:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

}
#overlay h1 { font-size:clamp(1.4rem,5vw,2.2rem); margin-bottom:10px; font-weight:700; }
#overlay p  { font-size:clamp(0.85rem,3vw,1.05rem); opacity:0.82; margin-bottom:22px; max-width:340px; line-height:1.5; }
#startBtn {
  padding:14px 36px; font-size:1.1rem; border:none; border-radius:50px;
  background:linear-gradient(135deg,#4a9eff,#0066cc); color:#fff;
  cursor:pointer; font-weight:600; letter-spacing:0.03em;
  box-shadow:0 4px 20px rgba(74,158,255,0.4);
}
#startBtn:active { transform:scale(0.96); }
#hud {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.88); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:clamp(0.75rem,2.5vw,0.9rem); pointer-events:none; text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,0.7); z-index:5; white-space:nowrap;
}

  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.75); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:clamp(0.7rem,2.2vw,0.85rem); pointer-events:none;
  text-shadow:0 1px 3px rgba(0,0,0,0.8); z-index:5; white-space:nowrap;
  background:rgba(0,0,0,0.3); padding:4px 12px; border-radius:20px;
}
#touch-left, #touch-right {
  position:fixed; top:0; bottom:0; width:50%; opacity:0; z-index:4;

}
#touch-left  { left:0;  background:radial-gradient(ellipse at 20% 50%,rgba(100,180,255,0.15),transparent 70%); }
#touch-right { right:0; background:radial-gradient(ellipse at 80% 50%,rgba(100,180,255,0.15),transparent 70%); }

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const CFG = {
  worldSize: 6000, planeSpeed: 110, turnGain: 2.0, inputSmooth: 0.06,
  bankMult: 1.05, bankSmooth: 0.13, cameraSmooth: 0.068, lookSmooth: 0.10,
  camDist: 26, camHeight: 9, targetAlt: 180, altSmooth: 0.010,
  tiltClamp: 45, pitchClamp: 30, pitchGain: 60, pitchSmooth: 0.07,
};

function rng(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// 芒聰聙芒聰聙 Scene 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const renderer = new THREE.WebGLRenderer({ antialias: true });

document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 1, 14000);
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 2000, 5800);

const ambLight = new THREE.AmbientLight(0xc8d8f0, 0.45);
scene.add(ambLight);
const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
sunLight.position.set(800, 1200, 400);

sunLight.shadow.mapSize.width  = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 10;

sunLight.shadow.camera.right = sunLight.shadow.camera.top  =  1800;
sunLight.shadow.bias = -0.0005;
scene.add(sunLight);

fillLight.position.set(-600, 400, -800);

// 芒聰聙芒聰聙 Terrain 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const PARK_W1 = -400, PARK_W2 = 400, PARK_S = -2000, PARK_N = 2000;
function getHeight(x, z) {
  const cityX = Math.max(0, Math.abs(x) - 900);
  const cityZ = Math.max(0, Math.abs(z) - 2300);
  const blend = Math.min(1, Math.sqrt(cityX * cityX + cityZ * cityZ) / 500);
  if (blend < 0.001) return 0;
  const raw = Math.sin(x / 280) * Math.sin(z / 350) * 30
            + Math.sin(x / 140 + 1.2) * 12
            + Math.sin(z / 190 + 0.7) * 10;
  return raw * blend;
}

(function buildTerrain() {
  const urbanMat = new THREE.MeshLambertMaterial({ color: 0x8a9090 });
  const urban = new THREE.Mesh(new THREE.PlaneGeometry(CFG.worldSize, CFG.worldSize), urbanMat);
  urban.rotation.x = -Math.PI / 2;
  urban.position.y = -0.1;
  urban.receiveShadow = true;
  scene.add(urban);

  const parkMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3f });
  const park = new THREE.Mesh(new THREE.PlaneGeometry(800, 4000), parkMat);
  park.rotation.x = -Math.PI / 2;
  park.position.set(0, 0, 0);
  scene.add(park);

  const meadowMat = new THREE.MeshLambertMaterial({ color: 0x5a9e4a });
  [[0, -800, 350, 600], [-100, 500, 200, 400], [120, -200, 180, 300]].forEach(([px, pz, pw, pd]) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(pw, pd), meadowMat);
    m.rotation.x = -Math.PI / 2;
    m.position.set(px, 0.1, pz);
    scene.add(m);
  });
})();

// 芒聰聙芒聰聙 Outskirt terrain (rolling hills, lakes) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
(function buildOutskirts() {
  // Grass ground overlay for outer areas
  const grassMat = new THREE.MeshLambertMaterial({ color: 0x5a8c42 });
  const outerGrass = new THREE.Mesh(new THREE.PlaneGeometry(CFG.worldSize + 200, CFG.worldSize + 200), grassMat);
  outerGrass.rotation.x = -Math.PI / 2;
  outerGrass.position.y = -0.15;
  outerGrass.receiveShadow = true;
  scene.add(outerGrass);

  // Hill mounds 芒聙聰 flattened spheres placed in outer zone
  const hillMat  = new THREE.MeshLambertMaterial({ color: 0x5a9438 });
  const hillMat2 = new THREE.MeshLambertMaterial({ color: 0x6fa845 });
  const hillGeo  = new THREE.SphereGeometry(1, 8, 5);
  const rh = rng(77777);
  const hillDefs = [
    // [x, z, rx, ry, rz]
    [-1400,  1200, 260, 90, 240],
    [-1600, -800,  300, 80, 260],
    [-1800, 2600,  350,100, 300],
    [-1200, -2600, 280, 80, 250],
    [ 1500,  1000, 320, 90, 280],
    [ 1700, -1200, 290, 85, 260],
    [ 1300,  2800, 310, 95, 290],
    [ 1600, -2800, 270, 80, 240],
    [-2000,    0,  380,110, 320],
    [ 2100,  400,  360,105, 310],
    [-1500,  3000- 0, 290, 85, 260],
    [ 1400, -3000+ 0, 310, 90, 275],
    [-2200, -1600, 340,100, 300],
    [ 2300,  1800, 320, 95, 285],
    [-1000,  2900, 260, 80, 240],
    [ 1100, -2900, 280, 82, 250],
    [-1800, -2200, 350,100, 310],
    [ 1900,  2400, 330, 98, 295],
    [-2400,  1000, 370,108, 325],
    [ 2200, -600,  345, 102, 305],
  ];
  hillDefs.forEach(([x, z, rx, ry, rz]) => {
    const mat = rh() > 0.5 ? hillMat : hillMat2;
    const hill = new THREE.Mesh(hillGeo, mat);
    hill.position.set(x + (rh()-0.5)*80, ry * 0.18, z + (rh()-0.5)*80);
    hill.scale.set(rx, ry, rz);
    hill.receiveShadow = true;
    scene.add(hill);
  });

  // Outskirt lakes
  const lakeMat = new THREE.MeshLambertMaterial({ color: 0x3d6fa8, transparent: true, opacity: 0.82 });
  const lakePositions = [
    [-1500, -1800, 420, 310],
    [ 1600,  2200, 380, 280],
    [-1800,  2400, 340, 260],
    [ 1300, -2600, 450, 320],
    [-2100,  -200, 300, 220],
    [ 2000,   800, 280, 200],
  ];
  lakePositions.forEach(([x, z, w, d]) => {
    const lake = new THREE.Mesh(new THREE.PlaneGeometry(w, d), lakeMat);
    lake.rotation.x = -Math.PI / 2;
    const lakeY = getHeight(x, z) + 0.5;
    lake.position.set(x, lakeY, z);
    scene.add(lake);
  });
})();


// 芒聰聙芒聰聙 Trees 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
(function buildTrees() {
  const N = 1400;
  const r = rng(42000);
  const foliageMat  = new THREE.MeshLambertMaterial({ color: 0x2d7a1f });
  const foliage2    = new THREE.MeshLambertMaterial({ color: 0x1f6a12 });
  const trunkMat    = new THREE.MeshLambertMaterial({ color: 0x6a4a2a });
  const foliageInst = new THREE.InstancedMesh(new THREE.ConeGeometry(4.5, 12, 6), foliageMat, N);
  const foliage2Inst = new THREE.InstancedMesh(new THREE.ConeGeometry(3.2, 9, 6), foliage2, N);
  const trunkInst    = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.7, 1.1, 7, 5), trunkMat, N);
  foliageInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  foliage2Inst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  trunkInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  const dummy = new THREE.Object3D();
  for (let i = 0; i < N; i++) {
    let x, z, tries = 0;
    do {
      x = PARK_W1 + r() * (PARK_W2 - PARK_W1);
      z = PARK_S  + r() * (PARK_N  - PARK_S);
      tries++;
    } while (tries < 8 && x > -190 && x < 190 && z > 440 && z < 890);
    const sc = 0.5 + r() * 0.9;
    const gH = getHeight(x, z);
    dummy.position.set(x, gH + 3.5 * sc, z);
    dummy.scale.setScalar(sc);
    dummy.rotation.y = r() * Math.PI * 2;
    dummy.updateMatrix();
    trunkInst.setMatrixAt(i, dummy.matrix);
    dummy.position.set(x, gH + 11 * sc, z);
    dummy.updateMatrix();
    foliageInst.setMatrixAt(i, dummy.matrix);
    dummy.position.set(x, gH + 17 * sc, z);
    dummy.scale.setScalar(sc * 0.62);
    dummy.updateMatrix();
    foliage2Inst.setMatrixAt(i, dummy.matrix);
  }
  foliageInst.instanceMatrix.needsUpdate  = true;
  foliage2Inst.instanceMatrix.needsUpdate = true;
  trunkInst.instanceMatrix.needsUpdate    = true;
  scene.add(foliageInst, foliage2Inst, trunkInst);
})();

// 芒聰聙芒聰聙 Outskirt Trees 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
(function buildOutskirtTrees() {
  const N = 500;
  const r = rng(88888);
  const fMat1 = new THREE.MeshLambertMaterial({ color: 0x3a7a2a });
  const fMat2 = new THREE.MeshLambertMaterial({ color: 0x4a9438 });
  const tMat  = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
  const fInst1 = new THREE.InstancedMesh(new THREE.ConeGeometry(5.5, 14, 6), fMat1, N);
  const fInst2 = new THREE.InstancedMesh(new THREE.ConeGeometry(3.8, 10, 6), fMat2, N);
  const tInst  = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.8, 1.3, 8, 5), tMat, N);
  fInst1.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  fInst2.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  tInst.instanceMatrix.setUsage(THREE.StaticDrawUsage);
  const dummy = new THREE.Object3D();
  const half = CFG.worldSize * 0.47;
  for (let i = 0; i < N; i++) {
    let x, z, tries = 0;
    do {
      x = (r() - 0.5) * CFG.worldSize * 0.9;
      z = (r() - 0.5) * CFG.worldSize * 0.9;
      tries++;
    } while (tries < 15 && Math.abs(x) < 750 && Math.abs(z) < 2400);
    // Avoid lake spots
    const nearLake = [[-1500,-1800],[1600,2200],[-1800,2400],[1300,-2600],[-2100,-200],[2000,800]]
      .some(([lx,lz]) => Math.abs(x-lx)<280 && Math.abs(z-lz)<200);
    if (nearLake) { i--; continue; }
    const sc = 0.6 + r() * 1.0;
    const gH = getHeight(x, z);
    dummy.position.set(x, gH + 4 * sc, z);
    dummy.scale.setScalar(sc);
    dummy.rotation.y = r() * Math.PI * 2;
    dummy.updateMatrix();
    tInst.setMatrixAt(i, dummy.matrix);
    dummy.position.set(x, gH + 13 * sc, z);
    dummy.updateMatrix();
    fInst1.setMatrixAt(i, dummy.matrix);
    dummy.position.set(x, gH + 20 * sc, z);
    dummy.scale.setScalar(sc * 0.65);
    dummy.updateMatrix();
    fInst2.setMatrixAt(i, dummy.matrix);
  }
  fInst1.instanceMatrix.needsUpdate = true;
  fInst2.instanceMatrix.needsUpdate = true;
  tInst.instanceMatrix.needsUpdate  = true;
  scene.add(fInst1, fInst2, tInst);
})();

function buildBiplane() {
  const root = new THREE.Group();
  const M = {
    body:  new THREE.MeshLambertMaterial({ color: 0xf0a818 }),
    wing:  new THREE.MeshLambertMaterial({ color: 0xd08810 }),
    red:   new THREE.MeshLambertMaterial({ color: 0xcc2230 }),
    glass: new THREE.MeshLambertMaterial({ color: 0x99ccff, transparent: true, opacity: 0.65 }),
    metal: new THREE.MeshLambertMaterial({ color: 0x909090 }),
    dark:  new THREE.MeshLambertMaterial({ color: 0x222222 }),
    white: new THREE.MeshLambertMaterial({ color: 0xfafafa }),
  };
  function part(geo, mat, px=0,py=0,pz=0,rx=0,ry=0,rz=0,sx=1,sy=1,sz=1) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px, py, pz);
    m.rotation.set(rx, ry, rz);
    m.scale.set(sx, sy, sz);
    root.add(m);
    return m;
  }
  part(new THREE.BoxGeometry(2.0,1.7,8.5), M.body);
  part(new THREE.CylinderGeometry(0.38,0.95,2.4,8), M.body, 0,0,-5.2, Math.PI/2);
  part(new THREE.BoxGeometry(1.2,1.05,2.8), M.body, 0,-0.15,3.8);
  part(new THREE.BoxGeometry(16,0.28,2.5), M.wing, 0,1.9,-0.5);
  part(new THREE.BoxGeometry(13.5,0.22,2.1), M.wing, 0,-0.2,-0.5);
  part(new THREE.BoxGeometry(2.4,0.32,2.5), M.red, -3.8,1.91,-0.5);
  part(new THREE.BoxGeometry(2.4,0.32,2.5), M.red,  3.8,1.91,-0.5);
  part(new THREE.BoxGeometry(1.2,0.30,2.5), M.white, -7.2,1.91,-0.5);
  part(new THREE.BoxGeometry(1.2,0.30,2.5), M.white,  7.2,1.91,-0.5);
  const strutGeo = new THREE.BoxGeometry(0.24,2.1,0.24);
  for (const sx of [-3.0, 3.0]) for (const sz of [0.3, 1.8]) part(strutGeo, M.metal, sx,0.85,sz);
  part(new THREE.BoxGeometry(7.2,0.22,1.7), M.wing, 0,0.22,3.5);
  part(new THREE.BoxGeometry(0.22,2.2,1.8), M.wing, 0,1.2,3.4);
  part(new THREE.BoxGeometry(0.18,1.6,0.8), M.red, 0,1.0,4.2);
  part(new THREE.BoxGeometry(1.35,1.0,1.7), M.glass, 0,1.2,0.15);
  part(new THREE.SphereGeometry(0.45,6,5), M.dark, 0,1.95,0.3);
  part(new THREE.BoxGeometry(0.7,0.6,0.5), M.dark, 0,1.55,0.3);
  part(new THREE.TorusGeometry(0.88,0.18,8,12), M.metal, 0,0,-4.25, Math.PI/2);
  const propGroup = new THREE.Group();
  propGroup.position.z = -6.0;
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.32,0.7,8), M.metal);
  hub.rotation.x = Math.PI / 2;
  propGroup.add(hub);
  const bladeGeo = new THREE.BoxGeometry(0.32,4.2,0.14);
  const b1 = new THREE.Mesh(bladeGeo, M.dark);
  const b2 = b1.clone(); b2.rotation.z = Math.PI / 2;
  const tipGeo = new THREE.BoxGeometry(0.5,0.9,0.14);
  const t1 = new THREE.Mesh(tipGeo, M.red); t1.position.y = 2.2;
  const t2 = t1.clone(); t2.position.y = -2.2;
  const t3 = new THREE.Mesh(tipGeo, M.red); t3.position.x = 2.2;
  const t4 = t3.clone(); t4.position.x = -2.2;
  b1.add(t1, t2); b2.add(t3, t4);
  propGroup.add(b1, b2);
  root.add(propGroup);
  root.userData.propeller = propGroup;
  const wheelGeo = new THREE.TorusGeometry(0.58,0.21,6,10);
  for (const wx of [-1.7, 1.7]) {
    part(new THREE.BoxGeometry(0.18,1.5,0.18), M.metal, wx,-1.55,-1.9);
    part(new THREE.BoxGeometry(3.4,0.18,0.18), M.metal, 0,-2.3,-1.9);
    const wheel = new THREE.Mesh(wheelGeo, M.dark);
    wheel.position.set(wx, -2.4, -1.9);
    wheel.rotation.y = Math.PI / 2;
    root.add(wheel);
  }
  return root;
}

let rawGamma    = 0, rawBeta = 0, pitchNeutral = 65;

const cvs = renderer.domElement;
function getTouchDir(cx) { return cx < window.innerWidth * 0.5 ? -1 : 1; }
const leftEl  = document.getElementById('touch-left');
const rightEl = document.getElementById('touch-right');
function showTF(dir) {
  leftEl.classList.toggle('active',  dir === -1);
  rightEl.classList.toggle('active', dir ===  1);
}
cvs.addEventListener('touchstart', e => { touchDir = getTouchDir(e.touches[0].clientX); showTF(touchDir); }, { passive: true });
cvs.addEventListener('touchmove',  e => { touchDir = getTouchDir(e.touches[0].clientX); showTF(touchDir); }, { passive: true });
cvs.addEventListener('touchend',   () => { touchDir = 0; showTF(0); }, { passive: true });
cvs.addEventListener('mousedown',  e => { touchDir = getTouchDir(e.clientX); showTF(touchDir); });
cvs.addEventListener('mouseup',    () => { touchDir = 0; showTF(0); });
cvs.addEventListener('mouseleave', () => { touchDir = 0; showTF(0); });

document.getElementById('startBtn').addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') { window.addEventListener('deviceorientation', onOrientation, true); motionReady = true; }
    } catch(err) {}
  } else {
    window.addEventListener('deviceorientation', onOrientation, true);
    motionReady = true;
  }
  document.getElementById('overlay').style.display = 'none';
  if (rawBeta !== 0) pitchNeutral = rawBeta;
  gameStarted = true;
  clock.start();
});

let gameStarted = false;
let yaw = Math.PI;
let bobTime = 0;
const clock   = new THREE.Clock(false);
const camPos  = new THREE.Vector3();
const camLook = new THREE.Vector3();

{
  const initCamX = biplane.position.x + Math.sin(yaw) * CFG.camDist;
  const initCamZ = biplane.position.z + Math.cos(yaw) * CFG.camDist;
  camPos.set(initCamX, biplane.position.y + CFG.camHeight, initCamZ);

function animate() {
  requestAnimationFrame(animate);
  if (!gameStarted) {
    const t = Date.now() * 0.00018;
    camera.position.set(
      biplane.position.x + Math.sin(t) * 40,
      biplane.position.y + 18,
      biplane.position.z + Math.cos(t) * 40
    );
    camera.lookAt(biplane.position);
    biplane.userData.propeller.rotation.z += 0.04;
    renderer.render(scene, camera);
    return;
  }

  const dt = Math.min(clock.getDelta(), 0.05);

  let rawInput = 0;
  if (motionReady && Math.abs(rawGamma) > 1.5) {
    rawInput = Math.max(-1, Math.min(1, rawGamma / CFG.tiltClamp));
  } else {
    rawInput = touchDir;
  }
  const targetTurn = rawInput * CFG.turnGain;
  smoothTurn += (targetTurn - smoothTurn) * CFG.inputSmooth;
  yaw -= smoothTurn * dt;

  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);
  biplane.position.x += fwdX * CFG.planeSpeed * dt;
  biplane.position.z += fwdZ * CFG.planeSpeed * dt;

  bobTime += dt;
  let rawPitchInput = 0;
  if (motionReady) {
    rawPitchInput = Math.max(-1, Math.min(1, (rawBeta - pitchNeutral) / CFG.pitchClamp));
  }
  smoothPitch += (rawPitchInput - smoothPitch) * CFG.pitchSmooth;
  biplane.position.y += smoothPitch * CFG.pitchGain * dt;

  const gH = getHeight(biplane.position.x, biplane.position.z);
  const floorY = gH + 40;
  if (biplane.position.y < floorY) biplane.position.y += (floorY - biplane.position.y) * 0.12;
  if (!motionReady || Math.abs(rawPitchInput) < 0.12) {
    const wantY = gH + CFG.targetAlt;
    biplane.position.y += (wantY - biplane.position.y) * CFG.altSmooth;
  }

  const half = CFG.worldSize * 0.48;
  if (biplane.position.x >  half) biplane.position.x -= CFG.worldSize * 0.96;
  if (biplane.position.x < -half) biplane.position.x += CFG.worldSize * 0.96;
  if (biplane.position.z >  half) biplane.position.z -= CFG.worldSize * 0.96;
  if (biplane.position.z < -half) biplane.position.z += CFG.worldSize * 0.96;

  biplane.rotation.y = yaw;
  const targetBank = -smoothTurn * CFG.bankMult;
  biplane.rotation.z += (targetBank - biplane.rotation.z) * CFG.bankSmooth;
  biplane.rotation.x  = -smoothPitch * 0.5 + Math.sin(bobTime * 0.55) * 0.018;
  biplane.userData.propeller.rotation.z += dt * (20 + Math.abs(smoothTurn) * 2);

  const targetCam = new THREE.Vector3(
    biplane.position.x + Math.sin(yaw) * CFG.camDist,
    biplane.position.y + CFG.camHeight,
    biplane.position.z + Math.cos(yaw) * CFG.camDist
  );
  camPos.lerp(targetCam, CFG.cameraSmooth);
  camera.position.copy(camPos);

  const targetLook = new THREE.Vector3(
    biplane.position.x + fwdX * 18,
    biplane.position.y - 1,
    biplane.position.z + fwdZ * 18
  );
  camLook.lerp(targetLook, CFG.lookSmooth);
  camera.lookAt(camLook);

  updateRegion(biplane.position.x, biplane.position.z);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
