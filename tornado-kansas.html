<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORNADO! Kansas Chaos</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #efRating {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5vw;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            min-width: 150px;
            text-align: center;
        }
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 2vw;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.8;
        }
        #progressBar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #fff;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #progressFill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ffaa00);
            width: 0%;
            transition: width 0.2s;
        }
        #upgradeMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6vw;
            background: rgba(255,100,0,0.8);
            padding: 30px 50px;
            border-radius: 20px;
            display: none;
            z-index: 100;
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a4d2e, #2d5a3d);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }
        #startScreen.hidden {
            display: none;
        }
        .emoji-spinner {
            font-size: 15vw;
            animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #gameTitle {
            font-size: 8vw;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        #gameDesc {
            font-size: 3vw;
            text-align: center;
            margin: 20px 30px;
            line-height: 1.6;
        }
        #unleashBtn {
            font-size: 4vw;
            padding: 20px 60px;
            background: linear-gradient(135deg, #ff6b00, #ffaa00);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        #unleashBtn:active {
            transform: scale(0.95);
        }
        #touchZones {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            display: flex;
            pointer-events: all;
            z-index: 10;
        }
        .touchZone {
            flex: 1;
            opacity: 0;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .touchZone.active {
            opacity: 0.3;
            background: rgba(255,100,0,0.3);
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div class="emoji-spinner">ðªï¸</div>
        <div id="gameTitle">TORNADO!</div>
        <div id="gameDesc">
            Tilt your phone left and right to steer.<br/>
            Absorb everything in your path to grow stronger.<br/>
            Become an EF5 monster!
        </div>
        <button id="unleashBtn">UNLEASH</button>
    </div>

    <div id="hud">
        <div id="efRating">EF0</div>
        <div id="stats">
            <div>Absorbed: <span id="absorbedCount">0</span></div>
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
        </div>
        <div id="upgradeMessage"></div>
    </div>

    <div id="touchZones">
        <div class="touchZone" id="leftZone"></div>
        <div class="touchZone" id="rightZone"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============================================================================
        // CONFIG
        // ============================================================================
        const CFG = {
            worldSize: 6000,
            farmCount: 25,
            standaloneObjects: 60,
            farmSpacing: 1000,
            farmSpread: 200,

            tornadoSpeed: 90,
            maxPickupMass: [1, 5, 12, 50, 100, 999],  // per EF
            pickupRadiusMultiplier: 7,

            vortexKInward: 220,
            vortexKRotational: 220,

            orbitDuration: [8, 10, 12],
            orbitRadiusRange: [3, 5],

            debrisMaxCount: 50,

            efRadii: [15, 35, 65, 100, 150, Infinity],

            canvasWidth: window.innerWidth,
            canvasHeight: window.innerHeight,
        };

        // ============================================================================
        // SEEDED RNG
        // ============================================================================
        function rng(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }
        const rand = rng(42);

        // ============================================================================
        // THREE.JS SETUP
        // ============================================================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, CFG.canvasWidth / CFG.canvasHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(CFG.canvasWidth, CFG.canvasHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);

        // Scene atmosphere
        scene.background = new THREE.Color(0x4a6d5c);
        scene.fog = new THREE.Fog(0x4a6d5c, 2000, 5000);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffdd, 0.6);
        directionalLight.position.set(1000, 1500, 1000);
        scene.add(directionalLight);

        // ============================================================================
        // TERRAIN
        // ============================================================================
        function buildTerrain() {
            const geometry = new THREE.PlaneGeometry(CFG.worldSize, CFG.worldSize, 100, 100);
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                let z = Math.sin(x * 0.002) * 5 + Math.cos(y * 0.002) * 5;
                z += (rand() - 0.5) * 3;
                positions.setZ(i, z);
            }
            positions.needsUpdate = true;
            geometry.computeVertexNormals();

            // Field patches in varying greens/yellows
            const colors = [];
            for (let i = 0; i < positions.count; i++) {
                const shade = 0.4 + rand() * 0.5;
                const isYellow = rand() > 0.6;
                if (isYellow) {
                    colors.push(shade * 0.9, shade * 0.8, shade * 0.3);
                } else {
                    colors.push(shade * 0.4, shade * 0.6, shade * 0.3);
                }
            }
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            const material = new THREE.MeshLambertMaterial({ vertexColors: true });
            const terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            terrain.position.y = -0.5;
            scene.add(terrain);
            terrain.userData.isTerrain = true;
        }

        // Roads (simple gray lines on terrain)
        function buildRoads() {
            const roadMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const gridSpacing = CFG.farmSpacing;
            for (let i = 0; i < 7; i++) {
                const x = (i - 3) * gridSpacing;
                const geometry = new THREE.PlaneGeometry(CFG.worldSize, 50);
                const road = new THREE.Mesh(geometry, roadMaterial);
                road.rotation.x = -Math.PI / 2;
                road.position.set(x, 0.1, 0);
                scene.add(road);
            }
            for (let j = 0; j < 7; j++) {
                const z = (j - 3) * gridSpacing;
                const geometry = new THREE.PlaneGeometry(50, CFG.worldSize);
                const road = new THREE.Mesh(geometry, roadMaterial);
                road.rotation.x = -Math.PI / 2;
                road.position.set(0, 0.1, z);
                scene.add(road);
            }
        }

        // ============================================================================
        // OBJECT FACTORIES
        // ============================================================================
        function makeHouse() {
            const group = new THREE.Group();
            const wallMat = new THREE.MeshLambertMaterial({ color: 0xcc6633 });
            const roofMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });

            const walls = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 10), wallMat);
            walls.position.y = 4;
            group.add(walls);

            const roofGeom = new THREE.ConeGeometry(7, 5, 4);
            const roof = new THREE.Mesh(roofGeom, roofMat);
            roof.position.y = 8.5;
            group.add(roof);

            return group;
        }

        function makeBarn() {
            const group = new THREE.Group();
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x8b0000 });
            const roofMat = new THREE.MeshLambertMaterial({ color: 0x554400 });

            const walls = new THREE.Mesh(new THREE.BoxGeometry(16, 10, 20), wallMat);
            walls.position.y = 5;
            group.add(walls);

            const roof = new THREE.Mesh(new THREE.ConeGeometry(11, 6, 4), roofMat);
            roof.position.y = 10.5;
            group.add(roof);

            return group;
        }

        function makeSilo() {
            const group = new THREE.Group();
            const cylMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 20, 8), cylMat);
            cylinder.position.y = 10;
            group.add(cylinder);

            const capMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
            const cap = new THREE.Mesh(new THREE.ConeGeometry(4.5, 3, 8), capMat);
            cap.position.y = 21.5;
            group.add(cap);

            return group;
        }

        function makeCow() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x8b7355 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 5), bodyMat);
            body.position.y = 1;
            group.add(body);

            const headMat = new THREE.MeshLambertMaterial({ color: 0xa0826d });
            const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 4, 4), headMat);
            head.position.set(0, 1.5, 2.5);
            group.add(head);

            return group;
        }

        function makeHorse() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 6), bodyMat);
            body.position.y = 1.5;
            group.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 2), bodyMat);
            head.position.set(0, 2.5, 3);
            group.add(head);

            return group;
        }

        function makeTruck() {
            const group = new THREE.Group();
            const cabMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const cab = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 2.5), cabMat);
            cab.position.set(0, 1.25, -1);
            group.add(cab);

            const bedMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
            const bed = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 4), bedMat);
            bed.position.set(0, 1, 2);
            group.add(bed);

            return group;
        }

        function makeCar() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x0000cc });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 5), mat);
            body.position.y = 0.75;
            group.add(body);
            return group;
        }

        function makeTractor() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x00aa00 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 4), mat);
            body.position.y = 1;
            group.add(body);
            return group;
        }

        function makeTree() {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.2, 6, 4), trunkMat);
            trunk.position.y = 3;
            group.add(trunk);

            const foliageMat = new THREE.MeshLambertMaterial({ color: 0x2d5016 });
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(5, 8, 8), foliageMat);
            foliage.position.y = 7;
            group.add(foliage);

            return group;
        }

        function makeHayBale() {
            const mat = new THREE.MeshLambertMaterial({ color: 0xccaa44 });
            return new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2), mat);
        }

        function makeMailbox() {
            const group = new THREE.Group();
            const boxMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const box = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1), boxMat);
            box.position.y = 1;
            group.add(box);

            const postMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const post = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2, 4), postMat);
            post.position.y = 0.5;
            group.add(post);

            return group;
        }

        function makeFenceSection() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0xaa8844 });

            for (let i = 0; i < 4; i++) {
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3, 0.4), mat);
                post.position.set((i - 1.5) * 1.5, 1.5, 0);
                group.add(post);
            }

            const rail = new THREE.Mesh(new THREE.BoxGeometry(6, 0.4, 0.4), mat);
            rail.position.y = 2.5;
            group.add(rail);

            return group;
        }

        // ============================================================================
        // WORLD GENERATION
        // ============================================================================
        const worldObjects = [];

        function buildWorld() {
            buildTerrain();
            buildRoads();

            // Farm clusters
            const farmRand = rng(123);
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    const farmX = (i - 2) * CFG.farmSpacing + (farmRand() - 0.5) * CFG.farmSpread;
                    const farmZ = (j - 2) * CFG.farmSpacing + (farmRand() - 0.5) * CFG.farmSpread;

                    addWorldObject(makeHouse(), farmX, 0, farmZ, 40);
                    addWorldObject(makeBarn(), farmX + 30, 0, farmZ + 20, 100);
                    addWorldObject(makeSilo(), farmX - 20, 0, farmZ + 15, 80);
                    addWorldObject(makeCow(), farmX + 10, 0, farmZ - 20, 5);
                    addWorldObject(makeHorse(), farmX - 15, 0, farmZ - 25, 7);
                    addWorldObject(makeHayBale(), farmX + 15, 0, farmZ - 10, 1);
                    addWorldObject(makeMailbox(), farmX - 25, 0, farmZ - 15, 0.3);
                    addWorldObject(makeFenceSection(), farmX - 10, 0, farmZ + 25, 0.5);
                    addWorldObject(makeTree(), farmX + 25, 0, farmZ - 30, 3);
                    if (farmRand() > 0.5) {
                        addWorldObject(makeTruck(), farmX + 20, 0, farmZ + 10, 15);
                    }
                }
            }

            // Standalone objects scattered
            for (let i = 0; i < 60; i++) {
                const x = (farmRand() - 0.5) * CFG.worldSize;
                const z = (farmRand() - 0.5) * CFG.worldSize;
                const type = Math.floor(farmRand() * 3);

                if (type === 0) addWorldObject(makeTree(), x, 0, z, 3);
                else if (type === 1) addWorldObject(makeCow(), x, 0, z, 5);
                else addWorldObject(makeHayBale(), x, 0, z, 1);
            }
        }

        function addWorldObject(mesh, x, y, z, mass) {
            const obj = {
                mesh: mesh,
                position: new THREE.Vector3(x, y, z),
                mass: mass,
                capRadius: Math.max(3, Math.sqrt(mass) * 2),
                isCaught: false,
                isAbsorbed: false,
                velocity: new THREE.Vector3(),
                orbitAngle: 0,
                orbitRadius: 0,
                orbitHeight: 0,
                orbitSpeed: 0,
                orbitTime: 0,
                tumble: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                ),
            };
            mesh.position.copy(obj.position);
            scene.add(mesh);
            worldObjects.push(obj);
            return obj;
        }

        // ============================================================================
        // TORNADO STATE
        // ============================================================================
        const tornado = {
            position: new THREE.Vector3(0, 0, 0),
            radius: 10,
            height: 60,
            ef: 0,
            absorbed: 0,
            nextAbsorb: 30,
            direction: 0,  // radians, 0 = +x
            speed: CFG.tornadoSpeed,
            coreRadius: 5,
            circulating: 0,
            vortexStrength: 100,
        };

        let tornadoVisualGroup = null;
        let lastBuiltRadius = 0;

        function updateTornadoVisual() {
            const radiusChanged = Math.abs(tornado.radius - lastBuiltRadius) > 5;

            if (!tornadoVisualGroup || radiusChanged) {
                if (tornadoVisualGroup) scene.remove(tornadoVisualGroup);
                tornadoVisualGroup = new THREE.Group();
                lastBuiltRadius = tornado.radius;

                // Funnel: wide at top, narrow at bottom
                const topRadius = Math.min(tornado.radius, 50);
                const bottomRadius = Math.max(tornado.radius * 0.3, 5);
                const funnelGeom = new THREE.ConeGeometry(topRadius, tornado.height * 0.8, 16);
                const funnelMat = new THREE.MeshLambertMaterial({
                    color: 0x443366,
                    transparent: true,
                    opacity: 0.4,
                });
                const funnel = new THREE.Mesh(funnelGeom, funnelMat);
                funnel.rotation.x = Math.PI;  // flip: tip points down to ground
                funnel.position.y = tornado.height * 0.4;
                tornadoVisualGroup.add(funnel);

                // Rotating band rings
                const bandMat = new THREE.MeshLambertMaterial({ color: 0x555555, wireframe: false });
                for (let i = 0; i < 5; i++) {
                    const bandHeight = (tornado.height * 0.6 * i) / 4;
                    // Rings grow wider toward top (ground=narrow, sky=wide)
                    const bandTopRadius = bottomRadius + (topRadius - bottomRadius) * (i / 4);
                    const torusGeom = new THREE.TorusGeometry(bandTopRadius * 0.6, bandTopRadius * 0.15, 8, 32);
                    const band = new THREE.Mesh(torusGeom, bandMat);
                    band.rotation.x = Math.PI / 2;
                    band.position.y = bandHeight;
                    tornadoVisualGroup.add(band);
                }

                // Ground dust disc
                const dustGeom = new THREE.CylinderGeometry(topRadius * 1.3, topRadius * 1.3, 2, 16);
                const dustMat = new THREE.MeshLambertMaterial({
                    color: 0x888866,
                    transparent: true,
                    opacity: 0.5,
                });
                const dustDisc = new THREE.Mesh(dustGeom, dustMat);
                dustDisc.position.y = 1;
                tornadoVisualGroup.add(dustDisc);

                // Swirling particles
                const particleCount = Math.min(300, 200 + tornado.radius * 2);
                const particleGeom = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * topRadius * 1.2;
                    const h = Math.random() * tornado.height;
                    positions[i * 3] = Math.cos(angle) * r;
                    positions[i * 3 + 1] = h;
                    positions[i * 3 + 2] = Math.sin(angle) * r;
                }
                particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particleMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 2 });
                const particles = new THREE.Points(particleGeom, particleMat);
                tornadoVisualGroup.add(particles);

                scene.add(tornadoVisualGroup);
            }

            // Update rotation
            if (tornadoVisualGroup) {
                tornadoVisualGroup.rotation.y += 0.05;
                tornadoVisualGroup.position.copy(tornado.position);
                tornadoVisualGroup.position.y = 0;
            }
        }

        // ============================================================================
        // PHYSICS: VORTEX FORCES
        // ============================================================================
        function applyVortexForce(obj) {
            if (obj.isAbsorbed || obj.isCaught) return;

            const toObj = obj.position.clone().sub(tornado.position);
            const dist = toObj.length();
            const suction = tornado.radius * CFG.pickupRadiusMultiplier;

            if (dist > suction) return;

            const getDensity = () => Math.max(0.2, 1 - dist / suction);

            const towardsTornado = toObj.clone().negate().normalize();
            const tangent = new THREE.Vector3(-toObj.z, 0, toObj.x).normalize();

            // Rankine vortex: inside core = solid body, outside = free vortex
            let tangentialSpeed = 0;
            if (dist < tornado.coreRadius) {
                tangentialSpeed = (tornado.vortexStrength / tornado.coreRadius) * (dist / tornado.coreRadius);
            } else {
                tangentialSpeed = tornado.vortexStrength / Math.max(dist, tornado.coreRadius);
            }

            const forceInward = CFG.vortexKInward * tornado.radius / Math.max(dist * dist, 50);
            const forceRotational = CFG.vortexKRotational * tornado.radius / Math.max(dist, tornado.radius);

            const inwardForce = towardsTornado.multiplyScalar(forceInward * getDensity());
            const rotForce = tangent.multiplyScalar(forceRotational * getDensity());

            obj.velocity.add(inwardForce).add(rotForce);
            obj.velocity.multiplyScalar(0.98);
        }

        function checkCapture(obj) {
            if (obj.isAbsorbed || obj.isCaught) return false;

            const maxMass = CFG.maxPickupMass[tornado.ef] || 999;
            if (obj.mass > maxMass) return false;

            const dist = obj.position.distanceTo(tornado.position);
            if (dist < tornado.radius * 1.5) {
                obj.isCaught = true;
                obj.orbitRadius = tornado.radius * (3 + Math.random() * 2);
                obj.orbitHeight = tornado.height * (0.3 + Math.random() * 0.5);
                obj.orbitAngle = Math.random() * Math.PI * 2;
                obj.orbitTime = 0;
                obj.orbitDuration = CFG.orbitDuration[0] + Math.random() * (CFG.orbitDuration[2] - CFG.orbitDuration[0]);
                return true;
            }
            return false;
        }

        function updateOrbits() {
            worldObjects.forEach(obj => {
                if (!obj.isCaught || obj.isAbsorbed) return;

                obj.orbitTime += 1 / 60;
                const progress = obj.orbitTime / obj.orbitDuration;

                if (progress >= 1) {
                    // Absorb
                    obj.isAbsorbed = true;
                    obj.mesh.visible = false;
                    tornado.absorbed++;
                    tornado.radius += obj.mass * 0.12;
                    tornado.height = tornado.radius * 6;

                    const newEF = tornado.radius < 15 ? 0 :
                                 tornado.radius < 35 ? 1 :
                                 tornado.radius < 65 ? 2 :
                                 tornado.radius < 100 ? 3 :
                                 tornado.radius < 150 ? 4 : 5;
                    if (newEF > tornado.ef) {
                        tornado.ef = newEF;
                        showUpgradeMessage(`NOW EF${newEF}!`);
                        shakeScreen();
                    }
                } else {
                    // Spiral orbit: speed increases, radius shrinks as object gets sucked in
                    const orbitSpeed = 0.04 + progress * 0.08;
                    obj.orbitAngle += orbitSpeed;
                    const spiralRadius = obj.orbitRadius * (1 - progress * 0.75);
                    const spiralHeight = obj.orbitHeight * (0.4 + progress * 0.6);
                    const x = Math.cos(obj.orbitAngle) * spiralRadius;
                    const z = Math.sin(obj.orbitAngle) * spiralRadius;
                    obj.position.set(
                        tornado.position.x + x,
                        tornado.position.y + spiralHeight,
                        tornado.position.z + z
                    );
                    obj.mesh.position.copy(obj.position);

                    // Tumble â faster as it spirals in
                    const tumbleScale = 1 + progress * 3;
                    obj.mesh.rotation.x += obj.tumble.x * tumbleScale;
                    obj.mesh.rotation.y += obj.tumble.y * tumbleScale;
                    obj.mesh.rotation.z += obj.tumble.z * tumbleScale;
                }
            });
        }

        // ============================================================================
        // CONTROLS
        // ============================================================================
        let tiltX = 0, tiltY = 0;
        let leftPressed = false, rightPressed = false;

        window.addEventListener('deviceorientation', (e) => {
            tiltX = -(e.gamma || 0) / 45;  // -1 to 1
            tiltY = (e.beta || 0) / 45;
        });

        document.getElementById('leftZone').addEventListener('touchstart', () => { leftPressed = true; });
        document.getElementById('leftZone').addEventListener('touchend', () => { leftPressed = false; });
        document.getElementById('rightZone').addEventListener('touchstart', () => { rightPressed = true; });
        document.getElementById('rightZone').addEventListener('touchend', () => { rightPressed = false; });

        document.getElementById('leftZone').addEventListener('touchstart', (e) => {
            e.target.classList.add('active');
        });
        document.getElementById('leftZone').addEventListener('touchend', (e) => {
            e.target.classList.remove('active');
        });
        document.getElementById('rightZone').addEventListener('touchstart', (e) => {
            e.target.classList.add('active');
        });
        document.getElementById('rightZone').addEventListener('touchend', (e) => {
            e.target.classList.remove('active');
        });

        function updateControls() {
            let steering = tiltX;
            if (leftPressed) steering = -0.5;
            if (rightPressed) steering = 0.5;

            tornado.direction += steering * 0.05;
        }

        // ============================================================================
        // CAMERA
        // ============================================================================
        function updateCamera() {
            const chaseDist = 100 + tornado.radius * 0.5;
            const chaseHeight = 50 + tornado.radius * 0.3;

            const behindX = tornado.position.x - Math.cos(tornado.direction) * chaseDist;
            const behindZ = tornado.position.z - Math.sin(tornado.direction) * chaseDist;

            camera.position.lerp(new THREE.Vector3(behindX, chaseHeight, behindZ), 0.1);
            camera.lookAt(
                tornado.position.x + Math.cos(tornado.direction) * 50,
                tornado.position.y + chaseHeight * 0.5,
                tornado.position.z + Math.sin(tornado.direction) * 50
            );
        }

        // ============================================================================
        // HUD UPDATE
        // ============================================================================
        function updateHUD() {
            const ef = tornado.ef;
            document.getElementById('efRating').textContent = `EF${ef}`;
            document.getElementById('absorbedCount').textContent = tornado.absorbed;

            const nextThreshold = [30, 100, 250, 600, 1200, 9999];
            const progress = Math.min(100, (tornado.absorbed / nextThreshold[ef]) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showUpgradeMessage(msg) {
            const elem = document.getElementById('upgradeMessage');
            elem.textContent = msg;
            elem.style.display = 'block';
            setTimeout(() => { elem.style.display = 'none'; }, 500);
        }

        function shakeScreen() {
            const container = document.getElementById('hud');
            container.style.transform = 'translate(0, 0)';
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    container.style.transform = `translate(${(Math.random() - 0.5) * 20}px, ${(Math.random() - 0.5) * 20}px)`;
                }, i * 50);
            }
            setTimeout(() => { container.style.transform = 'translate(0, 0)'; }, 200);
        }

        // ============================================================================
        // GAME LOOP
        // ============================================================================
        let gameStarted = false;

        document.getElementById('unleashBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            gameStarted = true;
            if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', (e) => {
                                tiltX = -(e.gamma || 0) / 45;
                                tiltY = (e.beta || 0) / 45;
                            });
                        }
                    })
                    .catch(console.error);
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            if (!gameStarted) {
                renderer.render(scene, camera);
                return;
            }

            // Update tornado position (auto-advance)
            tornado.position.x += Math.cos(tornado.direction) * tornado.speed * (1/60);
            tornado.position.z += Math.sin(tornado.direction) * tornado.speed * (1/60);

            // Clamp to world
            tornado.position.x = Math.max(-CFG.worldSize/2, Math.min(CFG.worldSize/2, tornado.position.x));
            tornado.position.z = Math.max(-CFG.worldSize/2, Math.min(CFG.worldSize/2, tornado.position.z));

            updateControls();
            updateTornadoVisual();
            updateCamera();
            updateHUD();

            // Physics
            worldObjects.forEach(obj => {
                applyVortexForce(obj);
                if (!obj.isCaught && !obj.isAbsorbed) {
                    obj.position.add(obj.velocity.clone().multiplyScalar(1/60));
                    obj.mesh.position.copy(obj.position);
                    checkCapture(obj);
                }
            });
            updateOrbits();

            renderer.render(scene, camera);
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        buildWorld();
        camera.position.set(0, 100, 200);
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            CFG.canvasWidth = window.innerWidth;
            CFG.canvasHeight = window.innerHeight;
            camera.aspect = CFG.canvasWidth / CFG.canvasHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(CFG.canvasWidth, CFG.canvasHeight);
        });
    </script>
</body>
</html>
